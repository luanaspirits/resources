  render();
}

  const balancedCount = c.checklistBalanced.filter((x, i) => state.checkedBalanced[c.id + "-" + i]).length;
  const blockedCount = c.checklistBlocked.filter((x, i) => state.checkedBlocked[c.id + "-" + i]).length;

          <div class="custom-check ${checked ? "checked" : ""}" style="${checked ? `background:${c.color};` : ""}">${checked ? "\u2713" : ""}</div>

}

function toggleCheck(type, chakraId, i) {

function renderJournalView() {

  const entries = sorted.map(e => {

    return `<div class="entry"><div class="tt">\u{1F49C} ${e.chakraName}</div><div class="meta">${e.date}</div>${qas}</div>`;
  }).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Visit any chakra's Journal tab to start filling this in.</p>" : "";
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <div class="back-link" style="cursor:pointer; color:var(--muted-2); font-size:13px; margin-bottom:16px;" onclick="go({view:'dashboard'})">&larr; Back to the bundle</div>

    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, come back next week, it'll still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</span></div>
    <div class="card">${entries || empty}</div>
    <div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>
    ${footer()}
  `;
}

function downloadJournal() {
  let text = "THE 7 CHAKRA LOVE HEALING BUNDLE\nMy Journal, " + state.name + "\n\n";
  if (!state.journal.length) {
    text += "No entries yet.\n";
  } else {
    [...state.journal].reverse().forEach(e => {
      text += "== " + e.date + " \u00B7 " + e.chakraName + " ==\n";
      e.prompts.forEach((q, i) => { if (e.answers[i]) text += q + "\n" + e.answers[i] + "\n\n"; });
    });
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-7-chakra-love-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    ${tabsHtml()}
    ${content}
    ${state.activeChakra === 0 || state.activeChakra === CHAKRAS.length - 1 ? premiumPill() : ""}
    <div class="nav-arrows">
      <button class="btn ghost small" ${isFirst ? "disabled" : ""} onclick="switchChakra(${state.activeChakra - 1})">&larr; Previous</button>
      <div class="mid">${state.activeChakra + 1} of ${CHAKRAS.length}</div>
      <button class="btn ghost small" ${isLast ? "disabled" : ""} onclick="switchChakra(${state.activeChakra + 1})">Next &rarr;</button>
    </div>
    ${footer()}
  `;
}

/* ---------- ROUTER ---------- */

const STORAGE_KEY = "chakra-love-bundle-v1";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function render() {
  saveState();
  if (state.screen === "name") { renderName(); return; }
  if (state.view === "journal") { renderJournalView(); return; }
  renderDashboard();
}

loadState();
render();
</script>
