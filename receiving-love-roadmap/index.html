<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Become Magnetic To Love, an interactive roadmap for healing the inner child block that keeps you from receiving love.">
<title>Become Magnetic To Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #2a2040;
    --bg-2: #362a4d;
    --bg-3: #1a1226;
    --ink: #f7f2fa;
    --ink-soft: rgba(247,242,250,0.82);
    --ink-faint: rgba(247,242,250,0.56);
    --pink: #e896c4;
    --pink-2: #f0b8d9;
    --purple: #a97fd4;
    --purple-2: #c9a8e8;
    --gold: #e8c988;
    --holo: linear-gradient(135deg,#c9a8e8 0%,#f0b8d9 50%,#e8c988 100%);
    --card: rgba(255,255,255,0.06);
    --card-2: rgba(255,255,255,0.095);
    --border: rgba(169,127,212,0.22);
    --border-strong: rgba(169,127,212,0.40);
  }

  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    position: relative;
  }

  /* Ambient background: aurora glow + star field, sits behind everything */
  #bg-fx {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(232,150,196,0.10) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 10%, rgba(232,201,136,0.07) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 100%, rgba(169,127,212,0.10) 0%, transparent 55%);
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .s-star {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 6px 1px rgba(255,255,255,0.8);
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.8)} 50%{opacity:.9;transform:scale(1.3)} }

  #app { position: relative; z-index: 2; max-width: 640px; margin: 0 auto; padding: 36px 20px 64px; }

  h1, h2, h3 { font-family: 'Poppins', sans-serif; color: var(--ink); margin-bottom: 12px; }
  h1 { font-weight: 800; font-size: 32px; line-height: 1.2; letter-spacing: -0.3px; }
  h2 { font-weight: 700; font-size: 23px; }
  h3 { font-weight: 700; font-size: 17px; }
  p { line-height: 1.75; color: var(--ink-soft); font-size: 15px; margin-bottom: 14px; }

  .holo-text { background: var(--holo); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pink-2); margin-bottom: 10px; font-weight: 500; }
  .eyebrow.spaced { margin-top: 26px; }

  /* Glass cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px;
    margin-bottom: 18px;
    backdrop-filter: blur(6px);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px;
    padding: 13px 28px; border-radius: 999px; border: none; cursor: pointer;
    letter-spacing: 0.2px; text-decoration: none;
  }
  .btn.gold { background: var(--holo); color: #241a35; box-shadow: 0 6px 22px rgba(169,127,212,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
  .btn.gold:hover { transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--border-strong); }
  .btn.ghost:hover { color: var(--ink); border-color: var(--purple-2); }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }

  input[type=text] {
    width: 100%; background: var(--card-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; font-family: 'Nunito', sans-serif;
    font-size: 16px; color: var(--ink); margin-bottom: 16px;
  }
  input[type=text]::placeholder { color: var(--ink-faint); }
  textarea {
    width: 100%; background: var(--card-2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--ink); font-family: 'Nunito', sans-serif;
    font-size: 14.5px; padding: 14px; resize: vertical; min-height: 85px; margin-bottom: 14px;
  }
  .journal-q { font-size: 14px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 600; }

  /* Top bar */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 22px; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-icon {
    width: 36px; height: 36px; border-radius: 11px; background: var(--holo);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    box-shadow: 0 4px 16px rgba(169,127,212,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .topbar-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 16px; color: var(--ink); }
  .premium-pill {
    background: var(--holo); color: #241a35; font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 12px; border-radius: 999px; padding: 9px 18px; text-decoration: none;
    box-shadow: 0 4px 16px rgba(169,127,212,0.35);
  }

  /* Nav tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab {
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12.5px;
    background: var(--card); border: 1px solid var(--border); color: var(--ink-faint);
    border-radius: 999px; padding: 9px 16px; cursor: pointer;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { background: var(--holo); color: #241a35; border-color: transparent; }

  /* Save reminder */
  .save-reminder {
    background: linear-gradient(135deg, rgba(232,201,136,0.12), rgba(240,184,217,0.08));
    border: 1px solid var(--border-strong); border-radius: 14px; padding: 14px 18px;
    font-size: 13px; color: var(--ink-soft); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start;
  }

  /* Instructions list */
  .steps { list-style: none; margin-bottom: 16px; }
  .steps li { display: flex; gap: 14px; margin-bottom: 14px; font-size: 14.5px; color: var(--ink-soft); }
  .steps .num { flex-shrink: 0; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); padding-top: 1px; }
  .steps strong { color: var(--ink); }
  .rhythm { background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 13.5px; color: var(--ink-soft); }
  .rhythm strong { color: var(--ink); }

  /* Roadmap */
  .map-grid { display: grid; gap: 12px; margin-bottom: 20px; }
  .map-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 17px 20px; cursor: pointer; display: flex; align-items: center; gap: 16px;
    transition: all .15s;
  }
  .map-card:hover { background: var(--card-2); border-color: var(--border-strong); transform: translateX(2px); }
  .map-icon { font-size: 22px; flex-shrink: 0; }
  .map-text { flex: 1; }
  .map-text .t { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); }
  .map-text .s { font-size: 12.5px; color: var(--ink-faint); }
  .check {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-strong);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--ink-faint);
  }
  .check.done { background: var(--holo); color: #241a35; border-color: transparent; }

  .choice-list { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .choice {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 15px 18px; cursor: pointer; font-size: 14.5px; color: var(--ink-soft); transition: all .15s;
  }
  .choice:hover { border-color: var(--purple-2); background: var(--card-2); }
  .choice.selected { border-color: var(--pink-2); background: linear-gradient(135deg, rgba(255,138,209,0.1), rgba(169,127,212,0.08)); color: var(--ink); }

  /* Insight / prompt box, matches the dark gradient prompt panels */
  .insight {
    background: linear-gradient(135deg, #170f26, #1c1340, #170f26);
    border: 1px solid var(--border-strong); border-radius: 16px; padding: 22px; margin-top: 16px;
    position: relative; overflow: hidden;
  }
  .insight .k { font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .insight.alt .k { color: var(--pink-2); }
  .insight p { font-family: 'Fraunces', serif; font-style: italic; font-size: 15.5px; color: var(--ink-soft); margin: 0; line-height: 1.7; }

  .back-link { display: inline-block; color: var(--ink-faint); font-size: 13px; margin-bottom: 16px; cursor: pointer; }
  .back-link:hover { color: var(--ink-soft); }

  /* Card pull */
  .pull-intro { font-size: 13.5px; color: var(--ink-faint); margin-bottom: 20px; }
  .flip-scene { perspective: 1200px; margin-bottom: 22px; }
  .flip-card { position: relative; width: 100%; min-height: 220px; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(.4,.2,.2,1); }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 30px; }
  .flip-front { background: var(--holo); }
  .flip-front .mark { font-family: 'Poppins', serif; font-size: 30px; color: #241a35; letter-spacing: 0.08em; }
  .flip-front .tap { font-family: 'DM Mono', monospace; color: rgba(36,26,53,0.65); font-size: 11px; margin-top: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .flip-back { background: linear-gradient(135deg, #170f26, #1c1340, #170f26); border: 1px solid var(--border-strong); transform: rotateY(180deg); }
  .flip-back p { font-family: 'Fraunces', serif; font-size: 20px; font-style: italic; color: var(--ink); margin: 0; line-height: 1.5; }

  /* Breathe */
  .breathe-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 0 8px; }
  .breathe-ball { width: 130px; height: 130px; border-radius: 50%; background: var(--holo); box-shadow: 0 0 50px rgba(169,127,212,0.4); transition: transform 4s ease-in-out; margin-bottom: 22px; }
  .breathe-label { font-family: 'Poppins', sans-serif; font-size: 18px; color: var(--ink); min-height: 26px; }
  .box-steps { display: flex; gap: 6px; margin-top: 8px; margin-bottom: 18px; }
  .box-steps span { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--ink-faint); border: 1px solid var(--border); border-radius: 999px; padding: 5px 11px; }
  .box-steps span.on { background: var(--holo); color: #241a35; border-color: transparent; }

  /* Journal entries */
  .entry { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
  .entry:last-child { border: none; margin: 0; padding: 0; }
  .entry .tt { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .entry .q { font-size: 12.5px; color: var(--ink-faint); margin-bottom: 2px; }
  .entry .a { font-size: 14px; color: var(--ink-soft); margin-bottom: 8px; }

  /* Premium CTA, full version (used once) */
  .quizcta-card {
    background: linear-gradient(135deg, rgba(201,168,232,0.14), rgba(240,184,217,0.10));
    border: 1px solid var(--border-strong); border-radius: 20px; padding: 30px 26px; text-align: center; margin-top: 8px;
  }
  .quizcta-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pink); margin-bottom: 10px; }
  .quizcta-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 23px; color: var(--ink); margin-bottom: 12px; }
  .quizcta-body { font-size: 13.5px; line-height: 1.65; color: var(--ink-soft); max-width: 440px; margin: 0 auto 14px; }
  .quizcta-list { list-style: none; text-align: left; max-width: 380px; margin: 0 auto 20px; font-size: 13px; color: var(--ink-soft); }
  .quizcta-list li { padding: 5px 0 5px 18px; position: relative; }
  .quizcta-list li::before { content: '\2726'; position: absolute; left: 0; color: var(--gold); font-size: 11px; top: 8px; }

  /* Premium CTA, light version (used sparingly, everywhere else) */
  .premcta-card {
    display: flex; align-items: flex-start; gap: 13px;
    background: linear-gradient(135deg, rgba(232,201,136,0.08), rgba(240,184,217,0.06));
    border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-top: 10px;
  }
  .premcta-emoji { font-size: 20px; line-height: 1; }
  .premcta-body { flex: 1; }
  .premcta-text { font-size: 13px; line-height: 1.6; color: var(--ink-soft); margin-bottom: 6px; }
  .premcta-link { font-size: 12.5px; font-weight: 700; color: var(--pink-2); text-decoration: none; border-bottom: 1px solid rgba(240,184,217,0.4); padding-bottom: 1px; }
  .premcta-link:hover { color: var(--ink); }

  /* Share banner */
  .share-banner { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; margin-top: 20px; text-align: center; }
  .share-banner .k { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--purple-2); margin-bottom: 8px; }
  .share-banner p { font-size: 13.5px; margin-bottom: 14px; }

  /* Learn tab */
  .learn-list { display: flex; flex-direction: column; gap: 8px; }
  .learn-item {
    display: flex; align-items: center; gap: 10px; padding: 15px 18px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all .15s;
  }
  .learn-item:hover { background: var(--card-2); border-color: var(--border-strong); transform: translateX(2px); }
  .learn-item.static { cursor: default; flex-direction: column; align-items: flex-start; }
  .learn-item .t { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); }
  .learn-item .s { font-size: 12.5px; color: var(--ink-faint); }
  .learn-item a { text-decoration: none; }
  .learn-item .why { margin-top: 5px; line-height: 1.55; font-size: 12.5px; color: var(--ink-faint); }
  .linklist-tier { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--purple-2); }

  /* Quote text used in card journal */
  .quote-text { font-family: 'Fraunces', serif; font-style: italic; color: var(--ink); font-size: 18px; margin: 0; }
  .prompt-text { color: var(--ink-soft); }

  /* Footer */
  .site-footer { margin-top: 44px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; }
  .site-footer .brand { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px; color: var(--ink); margin-bottom: 6px; }
  .site-footer .links { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 0.5px; color: var(--ink-faint); line-height: 1.9; }
  .site-footer a { color: var(--purple-2); text-decoration: none; }
  .site-footer a:hover { color: var(--pink); }
</style>
</head>
<body>
<div id="bg-fx"></div>
<div id="stars"></div>
<div id="app"></div>

<script>
/* ---------- AMBIENT BACKGROUND (built once, not re-rendered) ---------- */
(function initStars() {
  const wrap = document.getElementById("stars");
  const n = 12;
  for (let i = 0; i < n; i++) {
    const s = document.createElement("div");
    s.className = "s-star";
    s.style.top = Math.random() * 100 + "%";
    s.style.left = Math.random() * 100 + "%";
    s.style.animationDelay = (Math.random() * 4) + "s";
    wrap.appendChild(s);
  }
})();

/* ---------- DATA ---------- */

const scenarios = [
  {
    id: "compliment", icon: "\u{1F4AC}",
    title: "Someone Gives You a Compliment",
    teaser: "What happens in your body when love shows up in words?",
    prompt: "A friend looks at you and says something kind. Maybe about how you look, something you made, or just who you are. What happens next?",
    choices: [
      { label: "I deflect it or make a joke", insight: "Deflecting is one of the most common ways we protect ourselves from love landing. Turning it into a joke lets some part of you stay safe by not letting the compliment fully register." },
      { label: "I freeze and don't know what to say", insight: "It's okay to freeze up when someone tries to give you love. This is so normal, especially if you're not used to receiving it. Your body can actually read a compliment as a threat instead of a gift, simply because it's unfamiliar." },
      { label: "I say thank you but feel uncomfortable inside", insight: "Saying thank you while feeling uncomfortable is actually a sign of real progress. You're letting the words in, even while the old resistance is still there." },
      { label: "I let it land and feel genuinely good", insight: "This is what receiving looks like when the pattern has softened. Notice what allowed you to let it land this time, that's information you can use again." }
    ],
    closing: "Whichever one felt true for you, {name}, there's nothing wrong with you. This is simply where your nervous system is right now, and it can change.",
    journalPrompts: ["What thought entered your mind in that moment?", "How did your body react?", "Is there an old belief this connects to?"]
  },
  {
    id: "loved-one", icon: "\u{1F49D}",
    title: "Your Person Does Something Loving",
    teaser: "The moment love shows up in action, not just words.",
    prompt: "Your person, whether that's your twin flame, a partner, or someone close to you, does something loving for you. What happens inside you?",
    choices: [
      { label: "I feel guilty, like I don't deserve it", insight: "Guilt is common here, especially if love has felt far away for a long time. Some part of you can feel like you have to earn what's freely being given." },
      { label: "I question their motives or wait for the catch", insight: "Waiting for the catch is a protector part doing its job, trying to prepare you for disappointment before it happens. It's not a character flaw, it's an old survival strategy." },
      { label: "I get excited but then pull back", insight: "This push and pull is exactly what it feels like to want something and be afraid of it at the same time. Excitement and fear can live in the body together." },
      { label: "I fully receive and feel safe", insight: "This is what it looks like when the guardedness has softened. It doesn't mean the fear never shows up again, it means you're building a new capacity." }
    ],
    closing: "I'll be honest, {name}, when I first started receiving love in my own union, it was exciting but also scary. There was a part of me that felt guilty, like I hadn't earned it yet. If that resonates, you're not behind. You're simply human.",
    journalPrompts: ["What was your first instinct when they showed you love?", "Did any part of you want to give something back right away, or pull away instead?", "What would it feel like to just let yourself have this?"]
  },
  {
    id: "admired", icon: "\u{2728}",
    title: "Someone Admires Something About You",
    teaser: "When love goes beneath the surface.",
    prompt: "Someone tells you they admire something about you. Your mind, your energy, the way you handle things. What's the first thing that happens?",
    choices: [
      { label: "I immediately think of a flaw instead", insight: "This is your mind trying to protect you by finding the version of reality it's used to. If you have a hard time receiving love, you're more likely to assume negative things about yourself are the real truth." },
      { label: "I assume they're just being nice", insight: "Explaining it away keeps the compliment at a safe distance. It's a subtle way of saying, this can't be fully true about me." },
      { label: "I feel exposed, like they're seeing too much", insight: "Being truly seen can feel more vulnerable than being unseen. If you're not used to that, it can register as unsafe even when it's actually safe." },
      { label: "I feel proud and say thank you", insight: "This is what it looks like when you can hold a good truth about yourself without shrinking it." }
    ],
    closing: "Here's a tool for you, {name}, for the moments a negative belief shows up instead. Ask yourself what that word actually means to you. Usually there's a younger part of you underneath the belief that just needs love, not correction.",
    journalPrompts: ["What flaw or doubt came up first, if any?", "If you asked that belief what it actually means, what answer comes up?", "What might your inner child need to hear instead?"]
  },
  {
    id: "self-critic", icon: "\u{1F6E1}",
    title: "Being Hard On Yourself First",
    teaser: "The protector part behind the pattern.",
    prompt: "You catch yourself being hard on yourself before anyone else has the chance to be. What's your relationship to this pattern right now?",
    choices: [
      { label: "I don't even notice I'm doing it, it just feels normal", insight: "That's how deep this pattern usually runs. If you reject yourself first, some part of you believes no one else can reject you. It feels like protection, even though it costs you receiving love." },
      { label: "I notice it but feel like I have to stay hard on myself", insight: "This often comes from growing up around high expectations or a parent who was hard to please. Being hard on yourself first can feel like the only way to stay safe, so it's not a flaw, it's a strategy that made sense once." },
      { label: "I've caught myself doing it and want to stop", insight: "Noticing it is the actual turning point. You can't change a pattern you can't see, and you're seeing it now." },
      { label: "I've already started changing this pattern", insight: "This is real, meaningful progress. Keep noticing the moments it softens, that's proof the new pattern is taking root." }
    ],
    closing: "The one sentence I want you to remember from this whole roadmap, {name}: when someone tries to give you love, notice your resistance to it, and talk to that part of yourself. Ask it, what are you afraid of right now?",
    journalPrompts: ["Where do you think this pattern first started for you?", "What is that protector part actually trying to keep you safe from?", "What would you say to that part of yourself, with love, right now?"]
  }
];

const cards = [
  "Receiving is not selfish. It's magnetism.",
  "You don't have to earn love to be worthy of it.",
  "Every compliment you accept is a rep in becoming magnetic to love.",
  "Letting someone help you is not weakness. It's practice.",
  "You are allowed to receive more than you give sometimes.",
  "Worthiness was never something you had to prove.",
  "Love doesn't require a resume.",
  "You can receive good things without immediately paying them back.",
  "Your inner child is the part of you that knows how to be magnetic to love.",
  "Learning to receive starts with learning to love your inner child.",
  "It's okay to feel uncomfortable receiving. Normalize it gently for your inner child.",

/* ---------- ROADMAP TAB ---------- */

function renderRoadmapHub() {
  const cardsHtml = scenarios.map(s => {

  }).join("");

function renderScenario() {
  const s = scenarios.find(x => x.id === state.scenarioId);

  const choicesHtml = s.choices.map((c, i) => `<div class="choice ${chosen === i ? "selected" : ""}" onclick="go({choiceIndex:${i}})">${c.label}</div>`).join("");
  const insightHtml = chosen !== null ? `
    <div class="insight"><div class="k">What This Can Mean</div><p>${s.choices[chosen].insight}</p></div>
    <div class="insight alt"><div class="k">From Luana</div><p>${s.closing.replace("{name}", state.name)}</p></div>
    <div class="btn-row">
      <button class="btn gold" onclick="go({screen:'roadmapJournal'})">Journal About This</button>
      <button class="btn ghost" onclick="go({screen:'roadmap', scenarioId:null, choiceIndex:null})">Back to Roadmap</button>
    </div>` : "";
  shell(`
    <div class="back-link" onclick="go({screen:'roadmap', scenarioId:null, choiceIndex:null})">&larr; Back</div>
    <div class="eyebrow">${s.icon} Scenario</div>
    <h2>${s.title}</h2>
    <p class="prompt-text">${s.prompt}</p>

function renderRoadmapJournal() {
  const s = scenarios.find(x => x.id === state.scenarioId);
  const existing = state.journal[s.id] || ["", "", ""];
  const fields = s.journalPrompts.map((q, i) => `<div class="journal-q">${q}</div><textarea id="j-${i}">${existing[i] || ""}</textarea>`).join("");
  shell(`
    <div class="back-link" onclick="go({screen:'scenario'})">&larr; Back to scenario</div>
    <div class="eyebrow">${s.icon} Journal</div>
    <h2>${s.title}</h2>
    ${saveReminder()}
    ${fields}
    <div class="btn-row">
      <button class="btn gold" onclick="saveRoadmapJournal('${s.id}', ${s.journalPrompts.length})">Save Entry</button>
      <button class="btn ghost" onclick="go({screen:'roadmap', scenarioId:null, choiceIndex:null})">Back to Roadmap</button>
    </div>

}

function saveRoadmapJournal(id, count) {
  const answers = [];
  for (let i = 0; i < count; i++) answers.push(document.getElementById("j-" + i).value);

/* ---------- CARD PULL TAB ---------- */

function renderCards() {
  const backText = state.currentCard !== null ? cards[state.currentCard] : "";
  shell(`
    <h2>A Message For ${state.name}</h2>
    <p class="pull-intro">Pull a card any time you need an affirmation to re-anchor you in self-love energy, magnetic to love.</p>
    <div class="flip-scene">
      <div class="flip-card ${state.cardFlipped ? "flipped" : ""}" id="flipCard">
        <div class="flip-face flip-front"><div><div class="mark">&#10022;</div><div class="tap">Tap Pull To Reveal</div></div></div>
        <div class="flip-face flip-back"><p>"${backText}"</p></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="pullCard()">Pull a Card</button>
      ${state.currentCard !== null && state.cardFlipped ? `<button class="btn ghost" onclick="go({screen:'cardJournal'})">Journal About This</button>` : ""}
    </div>
  `);
}

function pullCard() {
  let next;
  do { next = Math.floor(Math.random() * cards.length); } while (next === state.currentCard && cards.length > 1);
  state.currentCard = next;
  state.cardFlipped = false;
  render();
  requestAnimationFrame(() => {
    setTimeout(() => { state.cardFlipped = true; render(); }, 120);
  });
}

function renderCardJournal() {
  shell(`
    <div class="back-link" onclick="go({screen:'cards'})">&larr; Back to card pull</div>
    <div class="eyebrow">Journal</div>
    <h2>What comes up for you?</h2>
    <div class="card"><p class="quote-text">"${cards[state.currentCard]}"</p></div>

    <div class="journal-q">What does this bring up for you, ${state.name}?</div>
    <textarea id="cardResponse"></textarea>
    <div class="btn-row">
      <button class="btn gold" onclick="saveCardJournal()">Save Entry</button>
      <button class="btn ghost" onclick="go({screen:'cards'})">Back to Card Pull</button>
    </div>
  `);
}

function saveCardJournal() {
  const text = document.getElementById("cardResponse").value;
  state.cardJournal.push({ card: cards[state.currentCard], response: text });

/* ---------- BREATHE TAB (box breathing) ---------- */

let breathTimer = null;
const BOX_PHASES = ["Breathe in...", "Hold...", "Breathe out...", "Hold..."];

function renderBreathe() {
  shell(`
    <h2>Just Breathe, ${state.name}</h2>
    <p>Your body has to feel safe before it can receive. Box breathing, 4 seconds each phase, is one way to help it get there.</p>
    <div class="breathe-wrap">
      <div class="breathe-ball" id="breatheBall"></div>
      <div class="breathe-label" id="breatheLabel">Press start when you're ready</div>
      <div class="box-steps" id="boxSteps">
        <span data-p="0">Inhale</span><span data-p="1">Hold</span><span data-p="2">Exhale</span><span data-p="3">Hold</span>
      </div>
      <div class="btn-row"><button class="btn gold" id="breatheBtn" onclick="toggleBreathing()">Start</button></div>
    </div>
  `);
}

function toggleBreathing() {
  const ball = document.getElementById("breatheBall");
  const label = document.getElementById("breatheLabel");
  const btn = document.getElementById("breatheBtn");
  const steps = document.querySelectorAll("#boxSteps span");
  if (state.breathing) {
    state.breathing = false;
    clearTimeout(breathTimer);
    ball.style.transform = "scale(1)";
    label.textContent = "Press start when you're ready";
    btn.textContent = "Start";
    steps.forEach(s => s.classList.remove("on"));
    return;
  }
  state.breathing = true;
  btn.textContent = "Stop";
  let phase = 0;
  const runPhase = () => {
    if (!state.breathing) return;
    label.textContent = BOX_PHASES[phase];
    steps.forEach(s => s.classList.toggle("on", parseInt(s.dataset.p) === phase));
    ball.style.transition = "transform 4s ease-in-out";
    if (phase === 0) ball.style.transform = "scale(1.4)";
    else if (phase === 2) ball.style.transform = "scale(1)";
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(runPhase, 4000);
  };
  runPhase();
}

/* ---------- MY JOURNAL TAB ---------- */

function renderJournalTab() {
  const roadmapEntries = scenarios.filter(s => state.journal[s.id]).map(s => {
    const answers = state.journal[s.id];
    const qas = s.journalPrompts.map((q, i) => `<div class="q">${q}</div><div class="a">${answers[i] || "(left blank)"}</div>`).join("");
    return `<div class="entry"><div class="tt">${s.icon} ${s.title}</div>${qas}</div>`;
  }).join("");
  const cardEntries = state.cardJournal.map(e => `<div class="entry"><div class="tt">Card Pull</div><div class="q">"${e.card}"</div><div class="a">${e.response || "(left blank)"}</div></div>`).join("");
  const all = roadmapEntries + cardEntries;
  const empty = all === "" ? "<p>Nothing here yet. Walk through the roadmap or pull a card to start filling this in.</p>" : "";
  shell(`<h2>My Journal, ${state.name}</h2>${saveReminder()}<div class="card">${all || empty}</div><div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>${shareBanner()}${resourceNotePill()}`);
}

function downloadJournal() {
  let text = "BECOME MAGNETIC TO LOVE\nMy Journal, " + state.name + "\n\n";
  scenarios.forEach(s => {
    if (!state.journal[s.id]) return;
    text += "== " + s.title + " ==\n";
    s.journalPrompts.forEach((q, i) => { text += q + "\n" + (state.journal[s.id][i] || "(left blank)") + "\n\n"; });
  });
  if (state.cardJournal.length) {
    text += "== Card Pull ==\n";
    state.cardJournal.forEach(e => { text += '"' + e.card + '"\n' + (e.response || "(left blank)") + "\n\n"; });
  }
  if (text.trim() === "BECOME MAGNETIC TO LOVE\nMy Journal, " + state.name) text += "No entries yet.\n";
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "my-magnetic-love-journal.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- ROUTER ---------- */

function render() {
  if (state.screen === "name") return renderName();
  if (state.screen === "roadmap") return renderRoadmapHub();
  if (state.screen === "scenario") return renderScenario();
  if (state.screen === "roadmapJournal") return renderRoadmapJournal();
  if (state.screen === "cards") return renderCards();
  if (state.screen === "cardJournal") return renderCardJournal();
  if (state.screen === "learn") return renderLearn();
  if (state.screen === "breathe") return renderBreathe();
  if (state.screen === "journal") return renderJournalTab();
}

render();
