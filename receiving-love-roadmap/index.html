<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Receiving Love Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #211427;
    --card: #2c1b34;
    --card-hover: #331f3d;
    --text: #f3eae4;
    --muted: #b9a8c2;
    --gold: #c9a66b;
    --rose: #d89aae;
    --line: rgba(243,234,228,0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  .eyebrow {
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.15;
    margin: 0 0 16px;
  }
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 27px;
    line-height: 1.2;
    margin: 0 0 14px;
  }
  p { line-height: 1.75; color: var(--muted); font-size: 15px; margin: 0 0 16px; }
  .lead { color: var(--text); font-size: 16px; }
  .btn {
    display: inline-block;
    background: var(--rose);
    color: #241626;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    letter-spacing: 0.03em;
    cursor: pointer;
    text-decoration: none;
  }
  .btn.ghost {
    background: transparent;
    color: var(--rose);
    border: 1px solid var(--rose);
  }
  .btn.gold { background: var(--gold); }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .map-grid { display: grid; gap: 14px; margin: 28px 0; }
  .map-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: background 0.15s ease;
  }
  .map-card:hover { background: var(--card-hover); }
  .map-icon { font-size: 26px; flex-shrink: 0; }
  .map-text { flex: 1; }
  .map-text .t { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .map-text .s { font-size: 12.5px; color: var(--muted); }
  .check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--rose); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--rose);
  }
  .check.done { background: var(--rose); color: var(--card); border-color: var(--rose); }
  .choice-list { display: flex; flex-direction: column; gap: 10px; margin: 22px 0; }
  .choice {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    font-size: 14.5px;
    color: var(--text);
    text-align: left;
  }
  .choice:hover { background: var(--card-hover); border-color: var(--rose); }
  .choice.selected { border-color: var(--gold); background: var(--card-hover); }
  .insight {
    border-left: 2px solid var(--gold);
    padding-left: 16px;
    margin: 22px 0;
  }
  .insight .k {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    background: #1b1020;
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 14.5px;
    padding: 14px;
    resize: vertical;
    min-height: 90px;
    margin-bottom: 18px;
  }
  .journal-q { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .entry {
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .entry .tt { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold); margin-bottom: 8px; }
  .entry .q { font-size: 12.5px; color: var(--muted); margin-bottom: 3px; }
  .entry .a { font-size: 14px; color: var(--text); margin-bottom: 10px; }
  .resource-note {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    margin-top: 32px;
  }
  .resource-note .k {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--rose); margin-bottom: 8px;
  }
  .resource-note p { font-size: 13.5px; margin-bottom: 10px; }
  .resource-note a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }
  .back-link {
    display: inline-block;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
    cursor: pointer;
    text-decoration: none;
  }
  .back-link:hover { color: var(--rose); }
  .quote-card {
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 28px 26px;
    margin: 24px 0;
    text-align: center;
  }
  .quote-card p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--text);
    line-height: 1.5;
    margin: 0;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const scenarios = [
  {
    id: "compliment",
    icon: "\u{1F4AC}",
    title: "Someone Gives You a Compliment",
    teaser: "What happens in your body when love shows up in words?",
    prompt: "A friend looks at you and says something kind. Maybe about how you look, something you made, or just who you are. What happens next?",
    choices: [
      { label: "I deflect it or make a joke", insight: "Deflecting is one of the most common ways we protect ourselves from love landing. Turning it into a joke lets some part of you stay safe by not letting the compliment fully register." },
      { label: "I freeze and don't know what to say", insight: "It's okay to freeze up when someone tries to give you love. This is so normal, especially if you're not used to receiving it. Your body can actually read a compliment as a threat instead of a gift, simply because it's unfamiliar." },
      { label: "I say thank you but feel uncomfortable inside", insight: "Saying thank you while feeling uncomfortable is actually a sign of real progress. You're letting the words in, even while the old resistance is still there." },
      { label: "I let it land and feel genuinely good", insight: "This is what receiving looks like when the pattern has softened. Notice what allowed you to let it land this time, that's information you can use again." }
    ],
    closing: "Whichever one felt true for you, there's nothing wrong with you. This is simply where your nervous system is right now, and it can change.",
    journalPrompts: [
      "What thought entered your mind in that moment?",
      "How did your body react? Tight chest, urge to look away, warmth, something else?",
      "Is there an old belief this connects to?"
    ]
  },
  {
    id: "loved-one",
    icon: "\u{1F49D}",
    title: "Your Person Does Something Loving",
    teaser: "The moment love shows up in action, not just words.",
    prompt: "Your person, whether that's your twin flame, a partner, or someone close to you, does something loving for you. Maybe they surprise you, show up for you, or simply choose you again. What happens inside you?",
    choices: [
      { label: "I feel guilty, like I don't deserve it", insight: "Guilt is common here, especially if love has felt far away for a long time. Some part of you can feel like you have to earn what's freely being given." },
      { label: "I question their motives or wait for the catch", insight: "Waiting for the catch is a protector part doing its job, trying to prepare you for disappointment before it happens. It's not a character flaw, it's an old survival strategy." },
      { label: "I get excited but then pull back", insight: "This push and pull is exactly what it feels like to want something and be afraid of it at the same time. Excitement and fear can live in the body together." },
      { label: "I fully receive and feel safe", insight: "This is what it looks like when the guardedness has softened. It doesn't mean the fear never shows up again, it means you're building a new capacity." }
    ],
    closing: "I'll be honest, when I first started receiving love in my own union, it was exciting but also scary. There was a part of me that felt guilty, like I hadn't earned it yet. If that resonates, you're not behind. You're simply human.",
    journalPrompts: [
      "What was your first instinct when they showed you love?",
      "Did any part of you want to give something back right away, or pull away instead?",
      "What would it feel like to just let yourself have this?"
    ]
  },
  {
    id: "admired",
    icon: "\u{2728}",
    title: "Someone Admires Something About You",
    teaser: "When love goes beneath the surface.",
    prompt: "Someone tells you they admire something about you. Your mind, your energy, the way you handle things. What's the first thing that happens?",
    choices: [
      { label: "I immediately think of a flaw instead", insight: "This is your mind trying to protect you by finding the version of reality it's used to. If you have a hard time receiving love, you're more likely to assume negative things about yourself are the real truth." },
      { label: "I assume they're just being nice", insight: "Explaining it away keeps the compliment at a safe distance. It's a subtle way of saying, this can't be fully true about me." },
      { label: "I feel exposed, like they're seeing too much", insight: "Being truly seen can feel more vulnerable than being unseen. If you're not used to that, it can register as unsafe even when it's actually safe." },
      { label: "I feel proud and say thank you", insight: "This is what it looks like when you can hold a good truth about yourself without shrinking it." }
    ],
    closing: "Here's a tool for the moments a negative belief shows up instead. Ask yourself what that word actually means to you. If the thought is 'I'm not smart enough,' ask, what does smart enough even mean to you? Usually there's a younger part of you underneath the belief that just needs love, not correction.",
    journalPrompts: [
      "What flaw or doubt came up first, if any?",
      "If you asked that belief what it actually means, what answer comes up?",
      "What might your inner child need to hear instead?"
    ]
  },
  {
    id: "self-critic",
    icon: "\u{1F6E1}",
    title: "Being Hard On Yourself First",
    teaser: "The protector part behind the pattern.",
    prompt: "You catch yourself being hard on yourself before anyone else has the chance to be. Maybe you criticize your work before anyone comments, or downplay yourself before someone can. What's your relationship to this pattern right now?",
    choices: [
      { label: "I don't even notice I'm doing it, it just feels normal", insight: "That's how deep this pattern usually runs. If you reject yourself first, some part of you believes no one else can reject you. It feels like protection, even though it costs you receiving love." },
      { label: "I notice it but feel like I have to stay hard on myself", insight: "This often comes from growing up around high expectations or a parent who was hard to please. Being hard on yourself first can feel like the only way to stay safe, so it's not a flaw, it's a strategy that made sense once." },
      { label: "I've caught myself doing it and want to stop", insight: "Noticing it is the actual turning point. You can't change a pattern you can't see, and you're seeing it now." },
      { label: "I've already started changing this pattern", insight: "This is real, meaningful progress. Keep noticing the moments it softens, that's proof the new pattern is taking root." }
    ],
    closing: "The one sentence I want you to remember from this whole roadmap: when someone tries to give you love, notice your resistance to it, and talk to that part of yourself. Ask it, what are you afraid of right now?",
    journalPrompts: [
      "Where do you think this pattern first started for you?",
      "What is that protector part actually trying to keep you safe from?",
      "What would you say to that part of yourself, with love, right now?"
    ]
  }
];

let state = { screen: "intro", scenarioId: null, choiceIndex: null, journal: {} };

function go(screen, extra) {
  state = { ...state, screen, ...(extra || {}) };
  render();
}

function saveJournal(id, answers) {
  state.journal[id] = answers;
}

function resourceNote() {
  return `
    <div class="resource-note">
      <div class="k">Want To Go Deeper</div>
      <p>This roadmap is yours free as a Standard member and up, always. If this pattern runs deep for you, the Divine Reparenting Method\u2122 (inside Manifest Your Union) and the Love Wounds healing resources explore it even further, available inside Premium ($33/month). You'll also find more free tools inside Foundations and the Inner Union Vault.</p>
      <p><a href="#">Explore Premium</a> &nbsp;&middot;&nbsp; <a href="#">Foundations (free)</a> &nbsp;&middot;&nbsp; <a href="#">Inner Union Vault (free)</a></p>
    </div>`;
}

function renderIntro() {
  document.getElementById("app").innerHTML = `
    <div class="eyebrow">Standard tier and up &middot; Interactive Roadmap</div>
    <h1>The Receiving Love Roadmap</h1>
    <p class="lead">This isn't a roadmap you just read. It's one you walk through.</p>
    <p>You'll move through real scenarios, the ones that show up in everyday life and in the twin flame journey specifically. For each one, you'll choose how you actually react, not how you wish you'd react. Then we'll talk about what that reaction means, and you'll have space to journal it out.</p>
    <p>I say this with so much love, but sometimes the first step to receiving love is simply recognizing the areas where you're blocking it. That's all this is. Recognition, one scenario at a time.</p>
    <div class="btn-row">
      <button class="btn" onclick="go('hub')">Begin the Journey</button>
    </div>
  `;
}

function renderHub() {
  const cards = scenarios.map(s => {
    const done = !!state.journal[s.id];
    return `
      <div class="map-card" onclick="go('scenario', {scenarioId:'${s.id}', choiceIndex:null})">
        <div class="map-icon">${s.icon}</div>
        <div class="map-text">
          <div class="t">${s.title}</div>
          <div class="s">${s.teaser}</div>
        </div>
        <div class="check ${done ? "done" : ""}">${done ? "&#10003;" : ""}</div>
      </div>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="eyebrow">Choose A Scenario</div>
    <h2>Where do you want to start?</h2>
    <p>Walk through them in any order. Each one takes just a few minutes.</p>
    <div class="map-grid">${cards}</div>
    <div class="quote-card">
      <p>"Notice your resistance to receiving love, and talk to that part of yourself."</p>
    </div>
    <div class="btn-row">
      <button class="btn ghost" onclick="go('myJournal')">View My Journal</button>
    </div>
    ${resourceNote()}
  `;
}

function renderScenario() {
  const s = scenarios.find(x => x.id === state.scenarioId);
  const chosen = state.choiceIndex;
  const choicesHtml = s.choices.map((c, i) => `
    <div class="choice ${chosen === i ? "selected" : ""}" onclick="go('scenario', {scenarioId:'${s.id}', choiceIndex:${i}})">${c.label}</div>
  `).join("");

  const insightHtml = chosen !== null ? `
    <div class="insight">
      <div class="k">What This Can Mean</div>
      <p>${s.choices[chosen].insight}</p>
    </div>
    <div class="insight" style="border-color: var(--rose);">
      <div class="k" style="color: var(--rose);">From Luana</div>
      <p>${s.closing}</p>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="go('journal', {scenarioId:'${s.id}'})">Journal About This</button>
      <button class="btn ghost" onclick="go('hub')">Back to Map</button>
    </div>
  ` : "";

  document.getElementById("app").innerHTML = `
    <div class="back-link" onclick="go('hub')">&larr; Back to map</div>
    <div class="eyebrow">${s.icon} Scenario</div>
    <h2>${s.title}</h2>
    <p class="lead">${s.prompt}</p>
    <div class="choice-list">${choicesHtml}</div>
    ${insightHtml}
  `;
}

function renderJournal() {
  const s = scenarios.find(x => x.id === state.scenarioId);
  const existing = state.journal[s.id] || ["", "", ""];
  const fields = s.journalPrompts.map((q, i) => `
    <div class="journal-q">${q}</div>
    <textarea id="j-${i}" placeholder="Write here...">${existing[i] || ""}</textarea>
  `).join("");

  document.getElementById("app").innerHTML = `
    <div class="back-link" onclick="go('scenario', {scenarioId:'${s.id}', choiceIndex:${state.choiceIndex ?? 0}})">&larr; Back to scenario</div>
    <div class="eyebrow">${s.icon} Journal</div>
    <h2>${s.title}</h2>
    ${fields}
    <div class="btn-row">
      <button class="btn" onclick="submitJournal('${s.id}', ${s.journalPrompts.length})">Save Entry</button>
      <button class="btn ghost" onclick="go('hub')">Back to Map</button>
    </div>
  `;
}

function submitJournal(id, count) {
  const answers = [];
  for (let i = 0; i < count; i++) {
    answers.push(document.getElementById("j-" + i).value);
  }
  saveJournal(id, answers);
  go("hub");
}

function renderMyJournal() {
  const entries = scenarios.filter(s => state.journal[s.id]).map(s => {
    const answers = state.journal[s.id];
    const qas = s.journalPrompts.map((q, i) => `
      <div class="q">${q}</div>
      <div class="a">${answers[i] ? answers[i] : "(left blank)"}</div>
    `).join("");
    return `<div class="entry"><div class="tt">${s.icon} ${s.title}</div>${qas}</div>`;
  }).join("");

  const empty = entries === "" ? "<p>Nothing here yet. Walk through a scenario and journal about it to start filling this in.</p>" : "";

  document.getElementById("app").innerHTML = `
    <div class="back-link" onclick="go('hub')">&larr; Back to map</div>
    <div class="eyebrow">Your Space</div>
    <h2>My Journal</h2>
    <div style="background:rgba(232,197,136,0.14); border:1px solid #e8c988; border-radius:14px; padding:14px 18px; font-size:13px; color:var(--muted, #333); margin-bottom:20px;"><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, come back later, it'll still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</div>
    <div class="card">${entries || empty}</div>
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="go('hub')">Back to Map</button>
    </div>
    ${resourceNote()}
  `;
}

function downloadJournal() {
  let text = "THE RECEIVING LOVE ROADMAP\nMy Journal\n\n";
  scenarios.forEach(s => {
    if (!state.journal[s.id]) return;
    text += "== " + s.title + " ==\n";
    s.journalPrompts.forEach((q, i) => {
      text += q + "\n" + (state.journal[s.id][i] || "(left blank)") + "\n\n";
    });
  });
  if (text.trim() === "THE RECEIVING LOVE ROADMAP\nMy Journal") {
    text += "No entries yet.\n";
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "my-receiving-love-journal.txt";
  a.click();
  URL.revokeObjectURL(url);
}

const STORAGE_KEY = "receiving-love-roadmap-v1";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function render() {
  saveState();
  if (state.screen === "intro") renderIntro();
  else if (state.screen === "hub") renderHub();
  else if (state.screen === "scenario") renderScenario();
  else if (state.screen === "journal") renderJournal();
  else if (state.screen === "myJournal") renderMyJournal();
}

loadState();
render();
</script>
</body>
</html>
