/* ---------- BREATHING GATEWAY ---------- */

let breathTimer = null;
const BOX_PHASES = ["Breathe in...", "Hold...", "Breathe out...", "Hold..."];

function renderBreatheGate() {
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <h2 class="center mt-nav">Let's settle your body first</h2>
    <p class="center">A few rounds of square breathing before we begin, 4 seconds each phase.</p>
    <div class="breathe-wrap">
      <div class="breathe-ball" id="breatheBall"></div>
      <div class="breathe-label" id="breatheLabel">Press start when you're ready</div>
      <div class="box-steps" id="boxSteps">
        <span data-p="0">Inhale</span><span data-p="1">Hold</span><span data-p="2">Exhale</span><span data-p="3">Hold</span>
      </div>
      <div class="cycle-count" id="cycleCount">0 of 3 rounds</div>
      <div class="btn-row">
        <button class="btn gold" id="breatheBtn" onclick="toggleGateBreathing()">Start</button>
        <button class="btn ghost" onclick="proceedFromBreathe()">Skip This Step</button>
      </div>
    </div>
    ${footer()}
  `;
}

function toggleGateBreathing() {
  const ball = document.getElementById("breatheBall");
  const label = document.getElementById("breatheLabel");
  const btn = document.getElementById("breatheBtn");
  const stepsEls = document.querySelectorAll("#boxSteps span");
  const countEl = document.getElementById("cycleCount");
  if (state.breathing) {
    state.breathing = false; clearTimeout(breathTimer);
    ball.style.transform = "scale(1)"; label.textContent = "Press start when you're ready"; btn.textContent = "Start";
    stepsEls.forEach(s => s.classList.remove("on"));
    return;
  }
  state.breathing = true; btn.textContent = "Stop";
  let phase = 0;
  const runPhase = () => {
    if (!state.breathing) return;
    label.textContent = BOX_PHASES[phase];
    stepsEls.forEach(s => s.classList.toggle("on", parseInt(s.dataset.p) === phase));
    ball.style.transition = "transform 4s ease-in-out";
    if (phase === 0) ball.style.transform = "scale(1.4)";
    else if (phase === 2) ball.style.transform = "scale(1)";
    if (phase === 3) {
      state.breatheCycles++;
      countEl.textContent = state.breatheCycles + " of 3 rounds";
      if (state.breatheCycles >= 3) {
        breathTimer = setTimeout(() => { state.breathing = false; proceedFromBreathe(); }, 4000);
        return;
      }
    }
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(runPhase, 4000);
  };
  runPhase();
}

function proceedFromBreathe() {
  clearTimeout(breathTimer);
  state.breathing = false;
  if (state.healStyle === "meditation") {
    go({ screen: "meditationLink" });
  } else {
    go({ screen: "identify" });
  }
}

        <span data-p="0">Inhale</span><span data-p="1">Hold</span><span data-p="2">Exhale</span><span data-p="3">Hold</span>
      </div>
      <div class="btn-row"><button class="btn gold" id="breatheBtn" onclick="toggleFreeBreathing()">Start</button></div>
    </div>
    ${footer()}
  `;
}

function toggleFreeBreathing() {
  const ball = document.getElementById("breatheBall");
  const label = document.getElementById("breatheLabel");
  const btn = document.getElementById("breatheBtn");
  const stepsEls = document.querySelectorAll("#boxSteps span");
  if (state.breathing) {
    state.breathing = false; clearTimeout(breathTimer);
    ball.style.transform = "scale(1)"; label.textContent = "Press start when you're ready"; btn.textContent = "Start";
    stepsEls.forEach(s => s.classList.remove("on"));
    return;
  }
  state.breathing = true; btn.textContent = "Stop";
  let phase = 0;
  const runPhase = () => {
    if (!state.breathing) return;
    label.textContent = BOX_PHASES[phase];
    stepsEls.forEach(s => s.classList.toggle("on", parseInt(s.dataset.p) === phase));
    ball.style.transition = "transform 4s ease-in-out";
    if (phase === 0) ball.style.transform = "scale(1.4)";
    else if (phase === 2) ball.style.transform = "scale(1)";
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(runPhase, 4000);
  };
  runPhase();
}

/* ---------- LEARN: LESSONS + FAQ ---------- */

function renderLearnList() {
  const lessonItems = LESSONS.map(l => {
    const done = state.completedLessons[l.id];
    return `<div class="lesson-item" onclick="go({screen:'lesson', lessonOpen:'${l.id}'})">
      <div class="t">${l.icon} ${l.title} ${done ? "\u2726" : ""}</div>
      <div class="s">A short read</div>
    </div>`;
  }).join("");

  const faqItems = FAQS.map((f, i) => {
    const open = state.openAccordion === "faq-" + i;
    return `<div class="accordion-item" onclick="toggleAccordion('faq-${i}')">
      <div class="t">${f.q}</div>
      ${open ? `<div class="accordion-body"><p style="margin-bottom:0;">${f.a}</p></div>` : ""}
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    ${topNav()}
    <h2 class="mt-nav">Learn</h2>
    <p>Lessons on triggers, union, and the reparenting method behind this roadmap.</p>
    ${lessonItems}
    <div class="section-label" style="margin-top:28px;">Frequently Asked Questions</div>
    <p style="margin-top:-6px;">Skim through whenever you want to understand this work more, or rewire how you think about triggers in general. This isn't about doing it perfectly.</p>
    ${faqItems}
    ${footer()}
  `;
}

function toggleAccordion(id) {
  state.openAccordion = state.openAccordion === id ? null : id;
  render();
}

function renderLesson() {
  const l = LESSONS.find(x => x.id === state.lessonOpen);
  const done = state.completedLessons[l.id];
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <div class="back-link" onclick="go({screen:'learnList'})">&larr; Back to lessons</div>
    <h2>${l.icon} ${l.title}</h2>
    ${l.desc.map(p => `<p>${p}</p>`).join("")}
    <div class="section-label">Key Takeaways</div>
    ${l.takeaways.map(t => `<div class="tk-item"><span class="tk-spark">\u2726</span><span>${t}</span></div>`).join("")}
    ${l.link ? `<a class="link-btn" href="${l.link.url}" target="_blank" rel="noopener">${l.link.label} &rarr;</a>` : ""}
    <div class="btn-row left">
      <button class="btn gold" onclick="toggleLesson('${l.id}')">${done ? "\u2726 Completed" : "Mark Complete"}</button>
    </div>
    ${footer()}
  `;
}

function toggleLesson(id) {
  state.completedLessons[id] = !state.completedLessons[id];
  render();
}

/* ---------- COMMON TRIGGERS GUIDE ---------- */

function renderCommonTriggers() {
  const items = COMMON_TRIGGERS.map((c, i) => {
    const open = state.openAccordion === "ct-" + i;
    return `<div class="accordion-item" onclick="toggleAccordion('ct-${i}')">
      <div class="t">${c.title}</div>
      ${open ? `
        <div class="accordion-body">
          <div class="accordion-label">\u{1F338} A Compassionate Reframe</div>
          <p>${c.reframe}</p>
          <div class="accordion-label">\u{1F338} What You Could Say To Your Inner Child</div>
          <p style="margin-bottom:0; font-style:italic; color:var(--gold-soft);">\u201C${c.script}\u201D</p>
        </div>` : ""}
    </div>`;
  }).join("");
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <div class="back-link" onclick="go({screen:'hub'})">&larr; Back to menu</div>
    <h2>\u{1F338} Common Triggers Guide</h2>
    <p>32 common scenarios on the twin flame journey, a compassionate reframe for each, and something gentle you could say to your own inner child. Tap any one to expand it.</p>
    ${items}
    ${footer()}
  `;
}

/* ---------- MY JOURNAL ---------- */

function renderJournal() {
  const sorted = [...state.journal].reverse();
  const entries = sorted.map(session => {
    const type = TYPE_LABELS[session.type];
    const method = session.style === "meditation" ? "Guided Meditation" + (session.meditationUsed ? ": " + session.meditationUsed : "") : "Journal Prompts";
    let body = "";
    if (session.identify[0]) body += `<div class="q">The trigger</div><div class="a">${session.identify[0]}</div>`;
    if (session.identify[1]) body += `<div class="q">Where it lives in the body</div><div class="a">${session.identify[1]}</div>`;
    if (session.selectedAffirmations && session.selectedAffirmations.length) body += `<div class="q">Affirmations that resonated</div><div class="a">${session.selectedAffirmations.join(" \u00B7 ")}</div>`;
    if (session.compassionText) body += `<div class="q">To that part of me</div><div class="a">${session.compassionText}</div>`;
    if (session.didRewire) {
      if (session.selectedNewThought) body += `<div class="q">New thought chosen</div><div class="a">${session.selectedNewThought}</div>`;
      if (session.rewireText) body += `<div class="q">In my own words</div><div class="a">${session.rewireText}</div>`;
    }
    return `<div class="entry"><div class="tt">${type}</div><div class="meta">${session.date} &middot; ${method}</div>${body}</div>`;
  }).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Heal a trigger to start filling this in.</p>" : "";
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <h2 class="mt-nav">My Journal, ${state.name}</h2>
    ${saveReminderInline()}
    <div class="card">${entries || empty}</div>
    <div class="btn-row left">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="go({screen:'healStyle'})">Work Through Another Trigger</button>
      <button class="btn ghost" onclick="go({screen:'hub'})">Back To Main Menu</button>
    </div>
    ${footer()}
  `;
}

function downloadJournal() {
  let text = "THE TRIGGER RECOVERY ROADMAP\nMy Journal, " + (state.name || "") + "\n\n";
  if (!state.journal.length) {
    text += "No entries yet.\n";
  } else {
    [...state.journal].reverse().forEach(session => {
      const type = TYPE_LABELS[session.type];
      const method = session.style === "meditation" ? "Guided Meditation" + (session.meditationUsed ? ": " + session.meditationUsed : "") : "Journal Prompts";
      text += "== " + session.date + " \u00B7 " + type + " \u00B7 " + method + " ==\n";
      if (session.identify[0]) text += "The trigger: " + session.identify[0] + "\n";
      if (session.identify[1]) text += "Where it lives in the body: " + session.identify[1] + "\n";
      if (session.selectedAffirmations && session.selectedAffirmations.length) text += "Affirmations that resonated: " + session.selectedAffirmations.join(" | ") + "\n";
      if (session.compassionText) text += "To that part of me: " + session.compassionText + "\n";
      if (session.didRewire) {
        if (session.selectedNewThought) text += "New thought chosen: " + session.selectedNewThought + "\n";
        if (session.rewireText) text += "In my own words: " + session.rewireText + "\n";
      }
      text += "\n";
    });
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-trigger-recovery-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- ROUTER ---------- */

function render() {
  if (state.screen === "welcome") return renderWelcome();
  if (state.screen === "name") return renderNameScreen();
  if (state.screen === "safetyIntro") return renderSafetyIntro();
  if (state.screen === "hub") return renderHub();
  if (state.screen === "healStyle") return renderHealStyle();
  if (state.screen === "diagIntensity") return renderDiagIntensity();
  if (state.screen === "diagType") return renderDiagType();
  if (state.screen === "breatheGate") return renderBreatheGate();
  if (state.screen === "meditationLink") return renderMeditationLink();
  if (state.screen === "identify") return renderIdentify();
  if (state.screen === "compassion") return renderCompassion();
  if (state.screen === "rewireChoice") return renderRewireChoice();
  if (state.screen === "rewire") return renderRewire();
  if (state.screen === "healClosing") return renderHealClosing();
  if (state.screen === "breathe") return renderBreatheStandalone();
  if (state.screen === "learnList") return renderLearnList();
  if (state.screen === "lesson") return renderLesson();
  if (state.screen === "commonTriggers") return renderCommonTriggers();
  if (state.screen === "journal") return renderJournal();
}

render();
</script>
