const STORAGE_KEY = "signs-synchronicities-dreams-v1";

function go(patch) { state = { ...state, ...patch }; saveState(); render(); }

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable, journal still works this session */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function loggedCount() { return Object.keys(state.entries).length; }

}

function personalBanner() {
  return `<div class="personal-banner"><p><strong>Remember:</strong> symbols from the universe are personal. What it means to you, how it makes you feel, what you were thinking right before you saw it, and your own gut instinct matter more than anything this library says, or anything the internet says.</p></div>`;
}

/* ---------- NAME GATE ---------- */

function renderName() {
  document.getElementById("app").innerHTML = `
    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u2728</div><div class="topbar-title">Signs, Synchronicities & Dreams</div></div>
    <div class="center"><div class="std-pill">STANDARD TIER AND UP</div></div>
    <h1 class="center">A 30-day tracker for what the universe keeps showing you.</h1>
    <p class="center">Signs, synchronicities, and dreams, logged day by day, so you can connect more deeply with your subconscious mind and notice the patterns only visible over time.</p>
    ${personalBanner()}
    <div class="card">
      <h3>What should I call you?</h3>
      <input type="text" id="nameInput" placeholder="Your first name" />
      <button class="btn gold" onclick="submitName()">Begin Day 1</button>
    </div>
    ${footer()}
  `;
}

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- DAILY LOG ---------- */

function dailyHtml() {
  const day = state.currentDay;
  const entry = state.entries[day] || {};
  const isFirst = day === 1;
  const isLast = day === TOTAL_DAYS;

  const catChips = CATEGORIES.map(c => {
    const sel = entry.category === c;
    return `<div class="chip ${sel ? "selected" : ""}" onclick="setCategory(${day}, '${c}')">${c}</div>`;
  }).join("");

  const showFields = entry.category && entry.category !== "Nothing Today";

  const fields = showFields ? `
    <div class="journal-q">What did you notice?</div>
    <textarea id="f-desc">${entry.desc || ""}</textarea>
    <div class="journal-q">What were you thinking about right before this happened?</div>
    <textarea id="f-thinking">${entry.thinking || ""}</textarea>
    <div class="journal-q">How did it make you feel?</div>
    <textarea id="f-feeling">${entry.feeling || ""}</textarea>
    <div class="journal-q">What does this mean to you, personally? (Not what the library says, what YOU feel.)</div>
    <textarea id="f-meaning">${entry.meaning || ""}</textarea>
  ` : "";

  const dayGrid = Array.from({ length: TOTAL_DAYS }, (_, i) => i + 1).map(n => {
    const hasEntry = !!state.entries[n];
    return `<div class="day-cell ${n === day ? "active" : ""} ${hasEntry ? "done" : ""}" onclick="go({currentDay:${n}})">${n}</div>`;
  }).join("");

  return `
    <div class="day-stepper">
      <div class="day-arrow ${isFirst ? "disabled" : ""}" onclick="go({currentDay:${day - 1}})">&larr;</div>
      <div class="lbl">DAY ${day} OF ${TOTAL_DAYS}</div>
      <div class="day-arrow ${isLast ? "disabled" : ""}" onclick="go({currentDay:${day + 1}})">&rarr;</div>
    </div>
    <div class="day-grid">${dayGrid}</div>
    <h2>\u2728 What Did The Universe Show You Today?</h2>
    <div class="chip-grid">${catChips}</div>
    ${fields}
    ${showFields ? `<div class="btn-row"><button class="btn gold" onclick="saveEntry(${day})">${state.entries[day] && state.entries[day].desc ? "\u2726 Update" : "Save"}</button></div>` : ""}
    ${entry.category === "Nothing Today" ? `<p><em class="hl">That's completely okay. Not every day brings something noticeable, and that's part of the pattern too.</em></p><div class="btn-row"><button class="btn gold small" onclick="saveEntry(${day})">Save</button></div>` : ""}
    <div class="btn-row">
      <button class="btn ghost" onclick="go({activeTab:'library'})">Browse Symbol Library</button>
    </div>
  `;
}

function setCategory(day, cat) {
  const entry = state.entries[day] || {};
  entry.category = cat;
  state.entries[day] = entry;
  render();
}

function saveEntry(day) {
  const entry = state.entries[day] || {};
  if (entry.category && entry.category !== "Nothing Today") {
    entry.desc = document.getElementById("f-desc") ? document.getElementById("f-desc").value : entry.desc;
    entry.thinking = document.getElementById("f-thinking") ? document.getElementById("f-thinking").value : entry.thinking;
    entry.feeling = document.getElementById("f-feeling") ? document.getElementById("f-feeling").value : entry.feeling;
    entry.meaning = document.getElementById("f-meaning") ? document.getElementById("f-meaning").value : entry.meaning;
  }
  entry.date = new Date().toLocaleDateString();
  state.entries[day] = entry;
  render();
}

function logSymbolToday(symbolName) {
  const entry = state.entries[state.currentDay] || {};
  entry.category = entry.category || "Sign";
  entry.desc = symbolName;
  state.entries[state.currentDay] = entry;
  go({ activeTab: "daily" });
}

/* ---------- SYMBOL LIBRARY ---------- */

function libraryHtml() {
  const items = LIBRARY.map((cat, i) => {
    const open = state.openCategory === i;
    const symbols = cat.items.map(item => `
      <div class="symbol-card">
        <div class="t">${item.name}</div>
        <div class="m">${item.meaning}</div>
        <button class="log-btn" onclick="event.stopPropagation(); logSymbolToday('${item.name.replace(/'/g, "\\'")}')">Log This Today</button>
      </div>
    `).join("");
    return `<div class="accordion-item" onclick="toggleCategory(${i})">
      <div class="t">${cat.icon} ${cat.cat}</div>
      <div class="count">${cat.items.length} symbols</div>
      ${open ? `<div class="accordion-body">${symbols}</div>` : ""}
    </div>`;
  }).join("");
  return `
    <h2>\u{1F4D6} Symbol Library</h2>
    ${personalBanner()}
    <p>Tap a category to browse. Each entry shows a commonly associated meaning, but treat it as a starting point for your own reflection, not an answer key.</p>
    ${items}
  `;
}

function toggleCategory(i) {
  state.openCategory = state.openCategory === i ? null : i;
  render();
}

/* ---------- MY PATTERNS ---------- */

function patternsHtml() {
  const entries = Object.keys(state.entries).map(k => parseInt(k)).sort((a, b) => a - b);
  const signCount = entries.filter(d => state.entries[d].category === "Sign").length;
  const syncCount = entries.filter(d => state.entries[d].category === "Synchronicity").length;
  const dreamCount = entries.filter(d => state.entries[d].category === "Dream").length;

  const list = entries.filter(d => state.entries[d].category !== "Nothing Today").map(d => {
    const e = state.entries[d];
    return `<div class="entry">
      <div class="tt">Day ${d}, ${e.category}</div>
      <div class="meta">${e.date || ""}</div>
      ${e.desc ? `<div class="q">What I noticed</div><div class="a">${e.desc}</div>` : ""}
      ${e.thinking ? `<div class="q">Right before it happened</div><div class="a">${e.thinking}</div>` : ""}
      ${e.feeling ? `<div class="q">How it felt</div><div class="a">${e.feeling}</div>` : ""}
      ${e.meaning ? `<div class="q">What it meant to me</div><div class="a">${e.meaning}</div>` : ""}
    </div>`;
  }).join("");

  const empty = entries.length === 0 ? "<p>Nothing logged yet. Head to your Daily Log to begin.</p>" : "";

  return `
    <h2>\u{1F30C} My Patterns</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, restart your phone, come back next week, it'll all still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</span></div>
    <div class="stat-row">
      <div class="stat-box"><div class="n">${loggedCount()}</div><div class="l">Days Logged</div></div>
      <div class="stat-box"><div class="n">${signCount}</div><div class="l">Signs</div></div>
      <div class="stat-box"><div class="n">${syncCount}</div><div class="l">Synchronicities</div></div>
      <div class="stat-box"><div class="n">${dreamCount}</div><div class="l">Dreams</div></div>
    </div>
    <div class="card">${list || empty}</div>
    <div class="section-label">\u2726 Looking Back</div>
    <div class="card">
      <div class="journal-q">Looking across everything you've logged, what symbol or theme keeps appearing? What do you think it's trying to tell you?</div>
      <textarea id="patternsReflection">${state.patternsReflection}</textarea>
      <button class="btn gold small" onclick="savePatternReflection()">Save</button>
    </div>
    <div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>
  `;
}

function savePatternReflection() {
  state.patternsReflection = document.getElementById("patternsReflection").value;
  render();
}

function downloadJournal() {
  let text = "SIGNS, SYNCHRONICITIES & DREAMS FROM THE UNIVERSE\n30-Day Tracker, " + state.name + "\n\n";
  const days = Object.keys(state.entries).map(k => parseInt(k)).sort((a, b) => a - b);
  if (!days.length) {
    text += "No entries yet.\n";
  } else {
    days.forEach(d => {
      const e = state.entries[d];
      text += "== Day " + d + " (" + (e.date || "") + "), " + e.category + " ==\n";
      if (e.desc) text += "What I noticed: " + e.desc + "\n";
      if (e.thinking) text += "Right before it happened: " + e.thinking + "\n";
      if (e.feeling) text += "How it felt: " + e.feeling + "\n";
      if (e.meaning) text += "What it meant to me: " + e.meaning + "\n";
      text += "\n";
    });
  }
  if (state.patternsReflection) text += "== Looking Back: My Patterns ==\n" + state.patternsReflection + "\n";
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-30-day-intuition-tracker.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- LEARN MORE ---------- */

function learnHtml() {
  const items = LEARN_LINKS.map(l => {
    const badge = l.tier === "premium" ? `<span class="tier-badge premium">PREMIUM</span>` : `<span class="tier-badge standard">STANDARD</span>`;
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} ${badge}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `
    <h2>\u2728 Learn More</h2>
    <p>These lessons go deeper into everything this tracker touches on.</p>
    ${items}
    <div class="card ritual" style="margin-top:8px;">
      <p style="margin-bottom:10px;">Want the full toolkit for developing your intuition, from muscle testing to a digital card pull to a full symbol vocabulary?</p>
      <a class="btn gold small" href="${PREMIUM_URL}" target="_blank" rel="noopener">View Premium &rarr;</a>
    </div>
  `;
}

/* ---------- ROUTER ---------- */

function render() {
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.activeTab === "daily") content = dailyHtml();
  else if (state.activeTab === "library") content = libraryHtml();
  else if (state.activeTab === "patterns") content = patternsHtml();
  else if (state.activeTab === "learn") content = learnHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

loadState();
render();
</script>
