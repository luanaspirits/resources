</style>

  { icon: "\u{1F91D}", title: "Unblock Your Intuition With EFT Tapping", subtitle: "A guided tapping practice for release, useful on any day of this week.", url: "https://www.skool.com/union/classroom/07a7f557?md=d33894f0b0854726bc297c93513c716e", tier: "standard" },
  { icon: "\u{1F54A}", title: "Releasing Attachments & Surrendering", subtitle: "Go deeper into the surrender work from Day 4.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=327c624f2a9840f084b253bb6890c92d", tier: "premium" },
  { icon: "\u{1F476}", title: "Learn & Apply the Divine Reparenting Method", subtitle: "The full A-Z process behind this week's inner work.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=d12ff0fbcf8141a5b282f55562996358", tier: "premium" },
  { icon: "\u{1F5FA}", title: "Mapping Your Love Wounds + Beliefs", subtitle: "Trace where the perfectionism pattern actually started.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=a598f6013b3643afb7ac731385882582", tier: "premium" },
  { icon: "\u{1FAA9}", title: "Fragmentation, Parts & The Inner Child", subtitle: "Why trauma splits us into parts, and why perfectionism is often one of them.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=da82dd8abc014cd98ca3d3de9e4a2a86", tier: "premium" }
];

const PREMIUM_URL = "https://skool.com/union/plans";

/* ---------- STATE ---------- */

let state = {
  name: "", screen: "name",
  view: "day", activeDay: 0,
  checkedItems: {}, dayJournal: {}, openConcept: {}, spectrumLog: {}
};

function go(patch) { state = { ...state, ...patch }; render(); }

function dayComplete(day) {
  const j = state.dayJournal[day.id];
  return !!(j && day.journalPrompts.every((p, i) => j[i] && j[i].trim()));
}

/* ---------- SHARED CHROME ---------- */

function topNav() {
  return `<div class="topnav-wrap">
    <div class="topnav-brand-row">
      <div class="topnav-brand" onclick="go({view:'day', activeDay:0})"><div class="icon">\u{1FA9E}</div><div class="name">Release Perfectionism In Love</div></div>
      <div class="topnav-links">
        <button class="nav-link" onclick="go({view:'journal'})">Journal</button>
        <button class="nav-link" onclick="go({view:'learn'})">Learn</button>
      </div>
    </div>
    ${state.view === "day" ? dayPillsHtml() : ""}
  </div>`;
}

function dayPillsHtml() {
  return `<div class="day-pills">${DAYS.map((d, i) => {
    const done = dayComplete(d);
    return `<div class="day-pill ${state.activeDay === i ? "active" : ""} ${done ? "done" : ""}" onclick="go({view:'day', activeDay:${i}})">${d.num}</div>`;
  }).join("")}</div>`;
}

function footer() {
  return `<div class="site-footer">
    <div class="brand">Luana <em>Spirits</em></div>
    <div class="links">
      <a href="mailto:luana@luanaspirits.com">luana@luanaspirits.com</a> &middot;
      <a href="https://docs.google.com/document/d/12oUQEXXesDmVw_XEZH-GEc8NVbtFYyLYf3359hvxyFE/edit?usp=sharing" target="_blank" rel="noopener">Privacy Policy</a> &middot;
      <a href="https://docs.google.com/document/d/1i395On2ZByesCyRaIDocu1aIguhVxuHBQ1l_nPfVReQ/edit?usp=sharing" target="_blank" rel="noopener">Terms &amp; Conditions</a> &middot; &copy; 2026
    </div>
  </div>`;
}

function premiumPill() {
  return `<div class="cta-pill">
    <span>\u2728 Want to go deeper in Premium?</span>
    <a href="${PREMIUM_URL}" target="_blank" rel="noopener">Take a look &rarr;</a>
  </div>`;
}

/* ---------- NAME GATE ---------- */

function renderName() {
  document.getElementById("app").innerHTML = `
    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u{1FA9E}</div><div class="topbar-title">Release Perfectionism In Love</div></div>
    <div class="center"><div class="std-pill">STANDARD TIER AND UP</div></div>
    <h1 class="center">A 7-day journal to release the healing trap and come home to self-love.</h1>
    <p class="center">For anyone who's been caught trying to be the perfect partner, the perfect fix, the perfect version of themselves before they'll let love in. This is a 7-day journey, one day at a time.</p>
    <div class="reminder-note">
      <p><strong>\u{1F338} Before you begin:</strong> this works best done one day at a time, in order, over a real week. Set a daily reminder on your phone right now to come back and fill out that day's page. The magic of this journal is in returning to it daily, not doing it all in one sitting.</p>
    </div>
    <div class="tagline">You were never meant to be perfect to be loved. You were only ever meant to be you.</div>
    <div class="card">
      <h3>What should I call you?</h3>
      <input type="text" id="nameInput" placeholder="Your first name" />
      <button class="btn gold" onclick="submitName()">Begin Day 1</button>
    </div>
    ${footer()}
  `;
}

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- SPECTRUM GRAPH ---------- */

function spectrumCheckInHtml(dayNum) {
  const val = state.spectrumLog[dayNum];
  const markerLeft = val !== undefined ? val : 50;
  return `
    <div class="section-label">\u2726 Where Do You Feel Today?</div>
    <p style="margin-top:-6px;">Tap anywhere along the bar. There's no wrong answer, and this can move in any direction, any day.</p>
    <div class="spectrum-wrap">
      <div class="spectrum-track" id="spectrumTrack" onclick="setSpectrum(event, ${dayNum})">
        <div class="spectrum-zone hatred">Self<br>Rejection</div>
        <div class="spectrum-zone acceptance">Self<br>Acceptance</div>
        <div class="spectrum-zone love">Self<br>Love</div>
        ${val !== undefined ? `<div class="spectrum-marker" style="left:${markerLeft}%;"></div>` : ""}
      </div>
      <div class="hint">${val !== undefined ? "Tap again anytime today to update" : "Tap the bar to mark where you are today"}</div>
    </div>
  `;
}

function setSpectrum(evt, dayNum) {
  const track = document.getElementById("spectrumTrack");
  const rect = track.getBoundingClientRect();
  const pct = Math.max(2, Math.min(98, ((evt.clientX - rect.left) / rect.width) * 100));
  state.spectrumLog[dayNum] = pct;
  render();
}

function weekGraphHtml() {
  const rows = DAYS.map(d => {
    const val = state.spectrumLog[d.num];
    const hasVal = val !== undefined;
    return `<div class="week-row">
      <div class="lbl">Day ${d.num}</div>
      <div class="track ${hasVal ? "hasval" : ""}">${hasVal ? `<div class="dot" style="left:${val}%;"></div>` : ""}</div>
    </div>`;
  }).join("");
  return `<div class="week-graph">${rows}</div>`;
}

/* ---------- DAY VIEW ---------- */

function dayHtml() {
  const d = DAYS[state.activeDay];
  const isFirst = state.activeDay === 0;
  const isLast = state.activeDay === DAYS.length - 1;
  const existing = state.dayJournal[d.id] || {};
  const conceptOpen = !!state.openConcept[d.id];

  const inlinePrompts = d.journalPrompts.slice(0, d.inlineCount);
  const closingPrompts = d.journalPrompts.slice(d.inlineCount);

  const inlineHtml = inlinePrompts.map((q, i) => `
    <div class="journal-q">${q}</div>
    <textarea id="jp-${i}">${existing[i] || ""}</textarea>
  `).join("");

  const closingHtml = closingPrompts.map((q, i) => {
    const realIdx = d.inlineCount + i;
    return `<div class="journal-q">${q}</div><textarea id="jp-${realIdx}">${existing[realIdx] || ""}</textarea>`;
  }).join("");

  const checklistHtml = d.checklist.map((item, i) => {
    const key = d.id + "-" + i;
    const checked = !!state.checkedItems[key];
    return `<div class="check-row" onclick="toggleCheck('${key}')">
      <div class="check-box ${checked ? "done" : ""}">${checked ? "\u2713" : ""}</div>
      <div class="check-text ${checked ? "done" : ""}">${item}</div>
    </div>`;
  }).join("");

  return `
    <div class="day-badge">DAY ${d.num} OF 7</div>
    <h2>${d.icon} ${d.title}</h2>
    ${d.teaching1.map(p => `<p>${p}</p>`).join("")}
    <div class="accordion-item" onclick="toggleConcept('${d.id}')">
      <div class="t">${d.concept.title}</div>
      <div class="tap">tap to reveal</div>
      ${conceptOpen ? `<div class="accordion-body">${d.concept.body}</div>` : ""}
    </div>
    ${inlineHtml ? `<div class="card">${inlineHtml}</div>` : ""}
    ${d.teaching2 ? d.teaching2.map(p => `<p>${p}</p>`).join("") : ""}
    ${d.isGraphDay ? weekGraphHtml() : ""}
    ${spectrumCheckInHtml(d.num)}
    ${closingHtml ? `<div class="card">${closingHtml}<button class="btn gold small" onclick="saveDayJournal('${d.id}', ${d.journalPrompts.length})">${state.dayJournal[d.id] ? "\u2726 Update" : "Save"}</button></div>` : `<div class="btn-row"><button class="btn gold small" onclick="saveDayJournal('${d.id}', ${d.journalPrompts.length})">${state.dayJournal[d.id] ? "\u2726 Update" : "Save"}</button></div>`}
    <div class="section-label">Today's Practice</div>
    <div class="checklist">${checklistHtml}</div>
    <div class="day-nav">
      ${!isFirst ? `<button class="btn ghost small" onclick="go({activeDay:${state.activeDay - 1}})">&larr; Day ${DAYS[state.activeDay - 1].num}</button>` : `<span></span>`}
      <div class="mid">Day ${d.num} of 7</div>
      ${!isLast ? `<button class="btn ghost small" onclick="go({activeDay:${state.activeDay + 1}})">Day ${DAYS[state.activeDay + 1].num} &rarr;</button>` : `<button class="btn gold small" onclick="go({view:'reflection'})">Weekly Reflection &rarr;</button>`}
    </div>
    ${state.activeDay === 3 || state.activeDay === 6 ? premiumPill() : ""}
  `;
}

function toggleConcept(id) {
  state.openConcept[id] = !state.openConcept[id];
  render();
}

function toggleCheck(key) {
  state.checkedItems[key] = !state.checkedItems[key];
  render();
}

function saveDayJournal(dayId, count) {
  const answers = {};
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("jp-" + i);
    if (el) answers[i] = el.value;
  }
  state.dayJournal[dayId] = { ...(state.dayJournal[dayId] || {}), ...answers };
  render();
}

/* ---------- WEEKLY REFLECTION ---------- */

function reflectionHtml() {
  const existing = state.weeklyReflection || {};
  const prompts = [
    "Looking at your week, what do you notice about how non-linear this really was?",
    "What's one thing you want to remember about releasing perfectionism, moving forward?",
    "What would loving yourself \u201Cas you are today\u201D look like, practically, next week?"
  ];
  const fields = prompts.map((q, i) => `<div class="journal-q">${q}</div><textarea id="wr-${i}">${existing[i] || ""}</textarea>`).join("");
  return `
    <div class="back-link" style="cursor:pointer; color:var(--muted-2); font-size:13px; margin-bottom:16px;" onclick="go({view:'day', activeDay:6})">&larr; Back to Day 7</div>
    <h2>\u2728 Your Weekly Reflection</h2>
    <p>This is your path this week, exactly as you logged it, day by day.</p>
    ${weekGraphHtml()}
    <p style="margin-top:14px;">Notice how it moved, not in a straight line toward self-love, but back and forth, the way real healing actually happens. That's not a flaw in your process. That is the process.</p>
    <div class="card">${fields}
      <button class="btn gold small" onclick="saveReflection()">${state.weeklyReflection ? "\u2726 Update" : "Save"}</button>
    </div>
    <div class="card ritual center">
      <p style="margin-bottom:0; font-family:'Playfair Display', serif; font-style:italic; font-size:17px; color:var(--gold-soft);">You are worthy exactly as you are. Not once you finish healing. Not once you've earned it. Right now, ${state.name}.</p>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="go({view:'day', activeDay:0})">Back To Day 1</button>
    </div>
  `;
}

function saveReflection() {
  const answers = {};
  for (let i = 0; i < 3; i++) answers[i] = document.getElementById("wr-" + i).value;
  state.weeklyReflection = answers;
  render();
}

/* ---------- MY JOURNAL ---------- */

function journalHtml() {
  const entries = DAYS.filter(d => state.dayJournal[d.id]).map(d => {
    const j = state.dayJournal[d.id];
    const qas = d.journalPrompts.map((q, i) => j[i] ? `<div class="q">${q}</div><div class="a">${j[i]}</div>` : "").join("");
    return `<div class="entry"><div class="tt">${d.icon} Day ${d.num}: ${d.title}</div>${qas}</div>`;
  }).join("");
  const reflectionEntry = state.weeklyReflection ? `<div class="entry"><div class="tt">\u2728 Weekly Reflection</div>
    <div class="q">Looking at your week, what did you notice?</div><div class="a">${state.weeklyReflection[0] || ""}</div>
    <div class="q">What do you want to remember?</div><div class="a">${state.weeklyReflection[1] || ""}</div>
    <div class="q">What would self-love look like next week?</div><div class="a">${state.weeklyReflection[2] || ""}</div>
  </div>` : "";
  const empty = entries === "" && !reflectionEntry ? "<p>Nothing here yet. Visit Day 1 to begin.</p>" : "";
  return `
    <h2>\u{1F4D3} My Journal, ${state.name}</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span>This saves while your browser tab stays open. Download it before closing, or it won't be there next time.</span></div>
    <div class="card">${reflectionEntry}${entries || empty}</div>
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="go({view:'day', activeDay:0})">Back To Day 1</button>
    </div>
  `;
}

function downloadJournal() {
  let text = "RELEASE PERFECTIONISM IN LOVE\nMy 7-Day Journal, " + state.name + "\n\n";
  const any = DAYS.some(d => state.dayJournal[d.id]) || state.weeklyReflection;
  if (!any) {
    text += "No entries yet.\n";
  } else {
    DAYS.forEach(d => {
      const j = state.dayJournal[d.id];
      if (!j) return;
      text += "== Day " + d.num + ": " + d.title + " ==\n";
      d.journalPrompts.forEach((q, i) => { if (j[i]) text += q + "\n" + j[i] + "\n\n"; });
    });
    if (state.weeklyReflection) {
      text += "== Weekly Reflection ==\n";
      const prompts = [
        "Looking at your week, what do you notice about how non-linear this really was?",
        "What's one thing you want to remember about releasing perfectionism, moving forward?",
        "What would loving yourself \u201Cas you are today\u201D look like, practically, next week?"
      ];
      prompts.forEach((q, i) => { if (state.weeklyReflection[i]) text += q + "\n" + state.weeklyReflection[i] + "\n\n"; });
    }
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "release-perfectionism-in-love-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- LEARN MORE ---------- */

function learnHtml() {
  const items = LEARN_LINKS.map(l => {
    const badge = l.tier === "premium" ? `<span class="tier-badge premium">PREMIUM</span>` : `<span class="tier-badge standard">STANDARD</span>`;
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} ${badge}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `
    <h2>\u2728 Learn More</h2>
    <p>These lessons go deeper into everything this week touches on.</p>
    ${items}
    <div class="btn-row"><button class="btn ghost" onclick="go({view:'day', activeDay:0})">Back To Day 1</button></div>
  `;
}

/* ---------- ROUTER ---------- */

function render() {
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.view === "day") content = dayHtml();
  else if (state.view === "reflection") content = reflectionHtml();
  else if (state.view === "journal") content = journalHtml();
  else if (state.view === "learn") content = learnHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

render();
</script>
