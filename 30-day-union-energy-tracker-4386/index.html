<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The Union Alignment Daily Practice Tracker, a 30-day practice with a morning card pull to help you anchor into union energy, one day at a time.">
<title>The Union Alignment Daily Practice Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #faf7fc; --card: rgba(255,255,255,0.78); --card-2: rgba(255,255,255,0.95);
    --text: #3d2e5c; --muted: #7a6b94; --muted-2: #9b8ab8;
    --violet: #9b7fd4; --violet-deep: #6b4fa0; --periwinkle: #8ca8e8;
    --gold: #c9a44e; --gold-soft: #e8d5a8;
    --line: rgba(107,79,160,0.15); --line-strong: rgba(107,79,160,0.3);
  }
  body {
    background: radial-gradient(ellipse at 15% 0%, #e8d9f7 0%, transparent 55%),
                radial-gradient(ellipse at 88% 12%, #d8e8f5 0%, transparent 48%),
                radial-gradient(ellipse at 50% 108%, #f0dff7 0%, transparent 55%), var(--bg);
    color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; position: relative;
  }
  #sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .spark { position: absolute; border-radius: 50%; background: radial-gradient(circle, #fff, var(--violet) 70%, transparent 100%); animation: twinkle 4.5s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.7);} 50%{opacity:.75;transform:scale(1.2);} }
  #app { position: relative; z-index: 2; max-width: 660px; margin: 0 auto; padding: 0 20px 60px; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--violet-deep); margin-bottom: 12px; }
  h1 { font-weight: 700; font-size: 28px; line-height: 1.28; }
  h2 { font-weight: 600; font-size: 22px; }
  h3 { font-weight: 600; font-size: 16.5px; }
  p { line-height: 1.75; color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
  em.hl { font-style: italic; color: var(--violet-deep); }
  .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--violet-deep); font-size: 17px; text-align: center; margin: 16px 0; }
  .center { text-align: center; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 22px; margin-bottom: 16px; box-shadow: 0 8px 30px rgba(107,79,160,0.06); }
  .card.ritual { background: linear-gradient(150deg, rgba(155,127,212,0.10), rgba(140,168,232,0.10)); border-color: var(--line-strong); }
  .std-pill { display: inline-block; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; font-family: 'Jost', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.5px; border-radius: 999px; padding: 6px 14px; margin-bottom: 14px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Jost', sans-serif; font-weight: 700; font-size: 14px; padding: 13px 26px; border-radius: 999px; border: none; cursor: pointer; text-decoration: none; }
  .btn.gold { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; box-shadow: 0 6px 20px rgba(155,127,212,0.35); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line-strong); }
  .btn.ghost:hover { color: var(--violet-deep); border-color: var(--violet); }
  .btn.small { padding: 8px 16px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  input[type=text] { width: 100%; background: rgba(255,255,255,0.7); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; font-family: 'Jost', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 16px; }
  input[type=text]::placeholder { color: var(--muted-2); }
  textarea { width: 100%; background: rgba(255,255,255,0.7); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14.5px; padding: 13px; resize: vertical; min-height: 70px; margin-bottom: 14px; }
  .journal-q { font-size: 13.5px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .topbar-left { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 10px; }
  .topbar-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 16px rgba(155,127,212,0.4); flex-shrink: 0; }
  .topbar-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; color: var(--violet-deep); }

  .topnav-wrap { position: sticky; top: 0; z-index: 10; padding: 16px 0 12px; }
  .topnav-brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .topnav-brand { display: flex; align-items: center; gap: 8px; cursor: pointer; opacity: 0.9; }
  .topnav-brand .icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .topnav-brand .name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 12.5px; color: var(--violet-deep); }
  .topnav-links { display: flex; gap: 10px; }
  .nav-link { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted-2); cursor: pointer; background: none; border: none; padding: 3px 0; }
  .nav-link:hover { color: var(--violet-deep); }

  .day-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .day-pill { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--card); border: 1.5px solid var(--line); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .day-pill.active { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; border-color: transparent; font-weight: 700; }
  .day-pill.done { border-color: var(--gold); color: var(--violet-deep); }

  .day-badge { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .checklist { display: flex; flex-direction: column; gap: 9px; margin: 14px 0; }
  .check-row { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
  .check-box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--line-strong); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
  .check-box.done { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); border-color: transparent; }
  .check-text { font-size: 13.5px; color: var(--text); line-height: 1.55; }
  .check-text.done { color: var(--muted-2); text-decoration: line-through; }

  .accordion-item { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; cursor: pointer; margin-bottom: 14px; }
  .accordion-item:hover { border-color: var(--violet); }
  .accordion-item .t { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--violet-deep); }
  .accordion-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 13.5px; color: var(--muted); line-height: 1.7; }

  /* Card pull */
  .flip-scene { perspective: 1200px; display: flex; justify-content: center; margin-bottom: 20px; }
  .flip-card { position: relative; width: 210px; height: 300px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(.2,.8,.2,1); cursor: pointer; }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; text-align: center; box-shadow: 0 16px 40px rgba(107,79,160,0.25); }
  .flip-back { background: linear-gradient(160deg, var(--violet-deep), var(--violet)); border: 2px solid rgba(255,255,255,0.5); }
  .flip-back .glyph { font-size: 34px; color: rgba(255,255,255,0.7); }
  .flip-front { transform: rotateY(180deg); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; color: #fff; margin-top: 10px; }
  .card-message { font-family: 'Jost', sans-serif; font-size: 13.5px; color: rgba(255,255,255,0.92); font-style: italic; margin-top: 14px; line-height: 1.6; }
  .draw-prompt { text-align: center; }
  .draw-icon { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-soft), var(--violet)); margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 10px 30px rgba(155,127,212,0.3); }

  .link-item { display: flex; gap: 14px; align-items: center; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; text-decoration: none; }
  .link-icon { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .link-item .t { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--violet-deep); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .link-item .s { font-size: 12px; color: var(--muted-2); margin-top: 3px; }
  .tier-badge { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 1px; padding: 3px 8px; border-radius: 999px; font-weight: 500; }
  .tier-badge.premium { background: rgba(201,164,78,0.16); color: var(--gold); border: 1px solid rgba(201,164,78,0.4); }
  .tier-badge.standard { background: rgba(155,127,212,0.14); color: var(--violet); border: 1px solid rgba(155,127,212,0.35); }

  .entry { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 16px; }
  .entry:last-child { border: none; margin: 0; padding: 0; }
  .entry .tt { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--violet-deep); margin-bottom: 2px; }
  .entry .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted-2); margin-bottom: 8px; }
  .entry .q { font-size: 12px; color: var(--muted-2); margin-bottom: 2px; }
  .entry .a { font-size: 13.5px; color: var(--text); margin-bottom: 8px; }
  .save-reminder { background: rgba(201,164,78,0.10); border: 1px solid var(--gold); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; }
  .day-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .day-nav .mid { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted-2); white-space: nowrap; }

  .site-footer { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); text-align: center; }
  .site-footer .brand { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; color: var(--violet-deep); }
  .site-footer .brand em { font-style: italic; color: var(--gold); }
  .site-footer .links { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); line-height: 1.9; }
  .site-footer a { color: var(--muted-2); text-decoration: none; }
</style>
</head>

];

const PREMIUM_URL = "https://skool.com/union/plans";

/* ---------- STATE ---------- */

let state = {
  name: "", screen: "name",
  view: "day", activeDay: 1,
  dayData: {}
};

const STORAGE_KEY = "union-alignment-daily-practice-v1";
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
function loadState() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) state = { ...state, ...JSON.parse(raw) }; } catch (e) {} }
function go(patch) { state = { ...state, ...patch }; render(); }
function getDay(n) { if (!state.dayData[n]) state.dayData[n] = { checklist: {}, journal: {}, cardIdx: null, cardFlipped: false }; return state.dayData[n]; }
function dayComplete(n) { const d = state.dayData[n]; return !!(d && JOURNAL_PROMPTS.every((p, i) => d.journal[i] && d.journal[i].trim())); }

/* ---------- SHARED CHROME ---------- */

function topNav() {
  return `<div class="topnav-wrap">
    <div class="topnav-brand-row">
      <div class="topnav-brand" onclick="go({view:'day', activeDay:1})"><div class="icon">\u2728</div><div class="name">Union Alignment Daily Practice</div></div>
      <div class="topnav-links">
        <button class="nav-link" onclick="go({view:'start'})">Start Here</button>
        <button class="nav-link" onclick="go({view:'journal'})">Journal</button>
        <button class="nav-link" onclick="go({view:'learn'})">Learn</button>
      </div>
    </div>
    ${state.view === "day" ? dayPillsHtml() : ""}
  </div>`;
}

function dayPillsHtml() {
  const pills = Array.from({ length: TOTAL_DAYS }, (_, i) => i + 1).map(n => {
    const done = dayComplete(n);
    return `<div class="day-pill ${state.activeDay === n ? "active" : ""} ${done ? "done" : ""}" onclick="go({view:'day', activeDay:${n}})">${n}</div>`;
  }).join("");
  return `<div class="day-pills">${pills}</div>`;
}

/* ---------- NAME GATE ---------- */

    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u2728</div><div class="topbar-title">Union Alignment Daily Practice</div></div>
    <div class="center"><div class="std-pill">STANDARD TIER AND UP</div></div>
    <h1 class="center">A 30-day practice to anchor into union energy, one day at a time.</h1>
    <p class="center">For anyone on the twin flame journey, or any spiritual journey, who wants a daily ritual to stay grounded in the frequency of union. A morning card pull, a short checklist, and space to journal, every single day.</p>
    <div class="card">
      <p style="margin-bottom:0;"><strong style="color:var(--violet-deep);">Your answers save automatically</strong> in this browser, on this device. Set a daily reminder to open this each morning, do your card pull, and check in. When you finish all 30 days, simply start again at Day 1 for a new cycle.</p>
    </div>
    <div class="tagline">Union is a frequency. You anchor it daily, not once.</div>
    <div class="card">
      <h3>What should I call you?</h3>
      <input type="text" id="nameInput" placeholder="Your first name" />
      <button class="btn gold" onclick="submitName()">Begin Day 1</button>
    </div>
    ${footer()}
  `;
}

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- START HERE ---------- */

function startHtml() {
  return `
    <h2>\u2728 What Is Union Frequency?</h2>
    <div class="card">
      <p>Union frequency is the energetic state of wholeness, self-love, and alignment, the same state that both attracts real union and is the actual experience of it. Union begins within you, before it's ever reflected back by another person.</p>
      <p style="margin-bottom:0;">Being in union energy daily doesn't mean feeling perfect or happy all the time. It means anchoring into your own peace, worth, and self-love, regardless of circumstances, on purpose, every day.</p>
    </div>
    <div class="card ritual">
      <p style="margin-bottom:0; color:var(--text);">This tracker gives you a simple daily practice to build that muscle: a morning card pull, a short checklist, and space to journal. Do it once, and it's a nice moment. Do it for 30 days, and it becomes who you are.</p>
    </div>
    <div class="btn-row"><button class="btn gold" onclick="go({view:'day', activeDay:1})">Begin Day 1 &rarr;</button></div>
  `;
}

/* ---------- DAY VIEW ---------- */

function dayHtml() {
  const n = state.activeDay;
  const d = getDay(n);
  const isFirst = n === 1;
  const isLast = n === TOTAL_DAYS;

  const cardSection = cardPullHtml(n, d);

  const checklistHtml = CHECKLIST_ITEMS.map((item, i) => {
    const checked = !!d.checklist[i];
    return `<div class="check-row" onclick="toggleCheck(${n}, ${i})">
      <div class="check-box ${checked ? "done" : ""}">${checked ? "\u2713" : ""}</div>
      <div class="check-text ${checked ? "done" : ""}">${item}</div>
    </div>`;
  }).join("");

  const journalHtml = JOURNAL_PROMPTS.map((q, i) => `
    <div class="journal-q">${q}</div>
    <textarea id="jp-${i}">${d.journal[i] || ""}</textarea>
  `).join("");

  return `
    <div class="day-badge">DAY ${n} OF ${TOTAL_DAYS}</div>
    <h2>\u2728 Today's Union Alignment Practice</h2>
    ${cardSection}
    <div class="section-label">Today's Checklist</div>
    <div class="checklist">${checklistHtml}</div>
    <div class="card">${journalHtml}
      <button class="btn gold small" onclick="saveDayJournal(${n})">${dayComplete(n) ? "\u2726 Update" : "Save"}</button>
    </div>
    <div class="day-nav">
      ${!isFirst ? `<button class="btn ghost small" onclick="go({activeDay:${n - 1}})">&larr; Day ${n - 1}</button>` : `<span></span>`}
      <div class="mid">Day ${n} of ${TOTAL_DAYS}</div>
      ${!isLast ? `<button class="btn ghost small" onclick="go({activeDay:${n + 1}})">Day ${n + 1} &rarr;</button>` : `<button class="btn gold small" onclick="go({view:'journal'})">View My Journal &rarr;</button>`}
    </div>
  `;
}

function cardPullHtml(n, d) {
  if (d.cardIdx === null) {
    return `
      <p class="center">Start with your morning card pull, one energy or message for today.</p>
      <div class="draw-prompt"><div class="draw-icon">\u2726</div>
      <div class="btn-row" style="justify-content:center;"><button class="btn gold" onclick="drawCard(${n})">Pull Today's Card</button></div></div>
    `;
  }
  const c = UNION_DECK[d.cardIdx];
  return `
    <div class="flip-scene">
      <div class="flip-card ${d.cardFlipped ? "flipped" : ""}" onclick="flipCard(${n})">
        <div class="flip-face flip-back"><span class="glyph">\u2726</span></div>
        <div class="flip-face flip-front" style="background:linear-gradient(165deg, var(--violet-deep) 0%, var(--violet) 55%, ${c.c2} 135%);">
          <div style="font-size:32px; color:${c.c1};">${c.glyph}</div>
          <div class="card-title">${c.title}</div>
          <div class="card-message">${c.message}</div>
        </div>
      </div>
    </div>
    <p class="center hint" style="font-family:'DM Mono', monospace; font-size:11px; color:var(--muted-2);">${d.cardFlipped ? "Tap the card to draw again tomorrow" : "Tap the card to reveal today's message"}</p>
  `;
}

function drawCard(n) {
  const d = getDay(n);
  d.cardIdx = Math.floor(Math.random() * UNION_DECK.length);
  d.cardFlipped = false;
  render();
}

function flipCard(n) {
  const d = getDay(n);
  d.cardFlipped = !d.cardFlipped;
  render();
}

function toggleCheck(n, i) {
  const d = getDay(n);
  d.checklist[i] = !d.checklist[i];
  render();
}

function saveDayJournal(n) {
  const d = getDay(n);
  JOURNAL_PROMPTS.forEach((q, i) => { d.journal[i] = document.getElementById("jp-" + i).value; });
  render();
}

/* ---------- MY JOURNAL ---------- */

function journalHtml() {
  const days = Object.keys(state.dayData).map(k => parseInt(k)).sort((a, b) => a - b);
  const entries = days.map(n => {
    const d = state.dayData[n];
    const hasContent = JOURNAL_PROMPTS.some((q, i) => d.journal[i]);
    if (!hasContent) return "";
    const card = d.cardIdx !== null ? UNION_DECK[d.cardIdx] : null;
    const qas = JOURNAL_PROMPTS.map((q, i) => d.journal[i] ? `<div class="q">${q}</div><div class="a">${d.journal[i]}</div>` : "").join("");
    return `<div class="entry"><div class="tt">Day ${n}</div><div class="meta">${card ? "Card: " + card.title : ""}</div>${qas}</div>`;
  }).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Visit Day 1 to begin.</p>" : "";
  return `
    <h2>\u{1F4D3} My Journal, ${state.name}</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong> in this browser, on this device. They won't follow you to a different browser or device though, and clearing your browser's data will erase them, so download your journal now and then for a backup you can keep.</span></div>
    <div class="card">${entries || empty}</div>
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="resetCycle()">Start A New 30-Day Cycle</button>
    </div>
  `;
}

function resetCycle() {
  if (confirm("This will clear all 30 days so you can start a fresh cycle. Download your journal first if you want to keep it. Continue?")) {
    state.dayData = {};
    go({ view: "day", activeDay: 1 });
  }
}

function downloadJournal() {
  let text = "UNION ALIGNMENT DAILY PRACTICE TRACKER\nMy Journal, " + state.name + "\n\n";
  const days = Object.keys(state.dayData).map(k => parseInt(k)).sort((a, b) => a - b);
  let any = false;
  days.forEach(n => {
    const d = state.dayData[n];
    const hasContent = JOURNAL_PROMPTS.some((q, i) => d.journal[i]);
    if (!hasContent) return;
    any = true;
    const card = d.cardIdx !== null ? UNION_DECK[d.cardIdx] : null;
    text += "== Day " + n + (card ? " \u00B7 Card: " + card.title : "") + " ==\n";
    JOURNAL_PROMPTS.forEach((q, i) => { if (d.journal[i]) text += q + "\n" + d.journal[i] + "\n\n"; });
  });
  if (!any) text += "No entries yet.\n";
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "union-alignment-daily-practice-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- LEARN MORE ---------- */

function learnHtml() {
  const items = LEARN_LINKS.map(l => {
    const badge = l.tier === "premium" ? `<span class="tier-badge premium">PREMIUM</span>` : `<span class="tier-badge standard">STANDARD</span>`;
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} ${badge}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `
    <h2>\u2728 Learn More</h2>
    <p>These lessons go deeper into everything this daily practice touches on.</p>
    ${items}
  `;
}

/* ---------- ROUTER ---------- */

function render() {
  saveState();
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.view === "start") content = startHtml();
  else if (state.view === "day") content = dayHtml();
  else if (state.view === "journal") content = journalHtml();
  else if (state.view === "learn") content = learnHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

loadState();
render();
</script>
