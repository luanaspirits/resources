  { name: "King of Pentacles", arcana: "Pentacles", glyph: "\u2663", c1: "#9BD88C", c2: "#4E9E5F", message: "You have the ability to create real security and abundance today, in yourself first, and that's what union is built on." }
];

const LEARN_LINKS = [
  { icon: "\u{1F49E}", title: "The Healing Power of Self-Love", subtitle: "The foundation every card message points back to.", url: "https://www.skool.com/union/classroom/07a7f557?md=cf1fd5184858435eb36e138899241768", tier: "standard" },
  { icon: "\u{1F52E}", title: "Tarot Workshop Replay", subtitle: "Learn to read intuitively, no memorizing required.", url: "https://www.skool.com/union/classroom/122ebb7b?md=aad52e09721d42a592a5c63df4752975", tier: "premium" },
  { icon: "\u{1F91D}", title: "Unblock Your Intuition With EFT Tapping", subtitle: "A guided tapping practice to trust what you're receiving.", url: "https://www.skool.com/union/classroom/07a7f557?md=d33894f0b0854726bc297c93513c716e", tier: "standard" },
  { icon: "\u{1F30C}", title: "Separation Consciousness vs. Unity Consciousness", subtitle: "The full teaching behind what union frequency really means.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=548c0df49c514494aeaaa49f57fd1426", tier: "premium" }
];

/* ---------- STATE ---------- */

let state = {
  name: "", screen: "name",
  activeTab: "reading", readingStep: "breathe",
  intention: "", drawnCard: null, cardFlipped: false, shuffling: false,
  reflection1: "", reflection2: "", breathing: false,
  pulls: []
};

const STORAGE_KEY = "divine-union-message-generator-v1";
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
function loadState() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) state = { ...state, ...JSON.parse(raw) }; } catch (e) {} }
function go(patch) { state = { ...state, ...patch }; render(); }

/* ---------- SHARED CHROME ---------- */

function topNav() {
  return `<div class="topnav-wrap">
    <div class="topnav-brand-row">
      <div class="topnav-brand" onclick="go({activeTab:'reading', readingStep:'breathe'})"><div class="icon">\u2728</div><div class="name">Divine Union Message From Spirit</div></div>
      <div class="topnav-links">
        <button class="nav-link" onclick="go({activeTab:'journal'})">Journal</button>
        <button class="nav-link" onclick="go({activeTab:'learn'})">Learn</button>
      </div>
    </div>
  </div>`;
}

function footer() {
  return `<div class="site-footer">
    <div class="brand">Luana <em>Spirits</em></div>
    <div class="links">
      <a href="mailto:luana@luanaspirits.com">luana@luanaspirits.com</a> &middot;
      <a href="https://docs.google.com/document/d/12oUQEXXesDmVw_XEZH-GEc8NVbtFYyLYf3359hvxyFE/edit?usp=sharing" target="_blank" rel="noopener">Privacy Policy</a> &middot;
      <a href="https://docs.google.com/document/d/1i395On2ZByesCyRaIDocu1aIguhVxuHBQ1l_nPfVReQ/edit?usp=sharing" target="_blank" rel="noopener">Terms &amp; Conditions</a> &middot; &copy; 2026
    </div>
  </div>`;
}

/* ---------- NAME GATE ---------- */

function renderName() {
  document.getElementById("app").innerHTML = `
    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u2728</div><div class="topbar-title">Divine Union Message From Spirit</div></div>
    <div class="center"><div class="std-pill">STANDARD TIER AND UP</div></div>
    <h1 class="center">A breath, an intention, and a card for wherever you need guidance today.</h1>
    <p class="center">Ground yourself, set an intention, then pull from a full 78-card deck. Every single card carries its own tailored message on how to anchor into union, not a generic tarot meaning.</p>
    <div class="tagline">You can pull as many times as you need, for as many topics as you need.</div>
    <div class="card">
      <h3>What should I call you?</h3>
      <input type="text" id="nameInput" placeholder="Your first name" />
      <button class="btn gold" onclick="submitName()">Begin</button>
    </div>
    ${footer()}
  `;
}

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- READING FLOW ---------- */

let breathTimer = null;
const BOX_PHASES = ["Breathe in...", "Hold...", "Breathe out...", "Hold..."];

function readingHtml() {
  if (state.readingStep === "breathe") return breatheHtml();
  if (state.readingStep === "intention") return intentionHtml();
  if (state.readingStep === "shuffle") return shuffleHtml();
  if (state.readingStep === "reveal") return revealHtml();
  if (state.readingStep === "journal") return postJournalHtml();
}

function breatheHtml() {
  return `
    <h2 class="center">Let's Begin With A Breath</h2>
    <p class="center">A few rounds of square breathing, 4 seconds each phase, to settle your body before you pull.</p>
    <div class="breathe-wrap">
      <div class="breathe-ball" id="breatheBall"></div>
      <div class="breathe-label" id="breatheLabel">Press start when you're ready</div>
      <div class="btn-row">
        <button class="btn gold" id="breatheBtn" onclick="toggleBreathing()">Start</button>
        <button class="btn ghost" onclick="go({readingStep:'intention'})">Skip This Step</button>
      </div>
    </div>
  `;
}

function toggleBreathing() {
  const ball = document.getElementById("breatheBall");
  const label = document.getElementById("breatheLabel");
  const btn = document.getElementById("breatheBtn");
  if (state.breathing) {
    state.breathing = false; clearTimeout(breathTimer);
    ball.style.transform = "scale(1)"; label.textContent = "Press start when you're ready"; btn.textContent = "Start";
    return;
  }
  state.breathing = true; btn.textContent = "Continue \u2192";
  btn.setAttribute("onclick", "go({readingStep:'intention'})");
  let phase = 0;
  const runPhase = () => {
    if (!state.breathing) return;
    label.textContent = BOX_PHASES[phase];
    ball.style.transition = "transform 4s ease-in-out";
    if (phase === 0) ball.style.transform = "scale(1.4)";
    else if (phase === 2) ball.style.transform = "scale(1)";
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(runPhase, 4000);
  };
  runPhase();
}

function intentionHtml() {
  return `
    <h2 class="center">Set Your Intention</h2>
    <p class="center">What do you want guidance on today? Love, a specific connection, your own healing, anything is welcome here.</p>
    <div class="card">
      <textarea id="intentionField" placeholder="I'm calling in guidance on...">${state.intention}</textarea>
      <div class="btn-row"><button class="btn gold" onclick="saveIntentionAndShuffle()">Continue To My Card &rarr;</button></div>
    </div>
  `;
}

function saveIntentionAndShuffle() {
  state.intention = document.getElementById("intentionField").value;
  go({ readingStep: "shuffle" });
}

function shuffleHtml() {
  return `
    <h2 class="center">The Deck Is Shuffling</h2>
    <p class="center">Hold your intention in mind. When it feels right, tap to draw your card.</p>
    <div class="shuffle-stage">
      ${[0,1,2].map(i => `<div class="deck-card shuffling" style="animation-delay:${i*0.12}s; z-index:${10-i};"><span style="font-size:24px;color:rgba(255,255,255,0.6);">\u2726</span></div>`).join("")}
    </div>
    <div class="btn-row"><button class="btn gold" onclick="drawCard()">Pull My Card &rarr;</button></div>
  `;
}

function drawCard() {
  const card = DECK[Math.floor(Math.random() * DECK.length)];
  go({ drawnCard: card, cardFlipped: false, readingStep: "reveal" });
}

function revealHtml() {
  const c = state.drawnCard;
  return `
    <h2 class="center">\u2727 Your Card \u2727</h2>
    <div class="flip-scene">
      <div class="flip-card ${state.cardFlipped ? "flipped" : ""}" onclick="flipCard()">
        <div class="flip-face flip-back"><span style="font-size:30px;color:rgba(255,255,255,0.7);">\u2726</span></div>
        <div class="flip-face flip-front" style="background:linear-gradient(165deg, var(--violet-deep) 0%, var(--violet) 55%, ${c.c2} 135%);">
          <div style="font-size:38px; color:${c.c1};">${c.glyph}</div>
          <div class="card-arcana">${c.arcana.toUpperCase()}</div>
          <div class="card-name">${c.name}</div>
        </div>
      </div>
    </div>
    ${state.cardFlipped ? `
      <div class="message-card"><p>${c.message}</p></div>
      <div class="btn-row"><button class="btn gold" onclick="go({readingStep:'journal'})">Journal About This &rarr;</button></div>
    ` : `<p class="center hint" style="font-family:'DM Mono', monospace; font-size:11px; color:var(--muted-2);">Tap the card to reveal your message</p>`}
  `;
}

function flipCard() {
  go({ cardFlipped: true });
}

function postJournalHtml() {
  const c = state.drawnCard;
  return `
    <h2>${c.name}</h2>
    <div class="message-card"><p>${c.message}</p></div>
    <div class="card">
      <div class="journal-q">How does this message land for you?</div>
      <textarea id="reflection1">${state.reflection1}</textarea>
      <div class="journal-q">What's one way you can apply this today?</div>
      <textarea id="reflection2">${state.reflection2}</textarea>
      <button class="btn gold small" onclick="savePull()">Save This Reading</button>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="pullAgain()">Pull Again, New Topic &rarr;</button>
      <button class="btn ghost" onclick="go({activeTab:'journal'})">View My Journal</button>
    </div>
  `;
}

function savePull() {
  state.reflection1 = document.getElementById("reflection1").value;
  state.reflection2 = document.getElementById("reflection2").value;
  state.pulls.push({
    date: new Date().toLocaleString(),
    intention: state.intention,
    card: state.drawnCard.name,
    message: state.drawnCard.message,
    reflection1: state.reflection1,
    reflection2: state.reflection2
  });
  render();
}

function pullAgain() {
  go({ readingStep: "intention", intention: "", drawnCard: null, cardFlipped: false, reflection1: "", reflection2: "" });
}

/* ---------- MY JOURNAL ---------- */

function journalHtml() {
  const sorted = [...state.pulls].reverse();
  const entries = sorted.map(p => `<div class="entry">
    <div class="tt">${p.card}</div>
    <div class="meta">${p.date}</div>
    ${p.intention ? `<div class="q">My intention</div><div class="a">${p.intention}</div>` : ""}
    <div class="q">The message</div><div class="a">${p.message}</div>
    ${p.reflection1 ? `<div class="q">How it landed</div><div class="a">${p.reflection1}</div>` : ""}
    ${p.reflection2 ? `<div class="q">How I'll apply it</div><div class="a">${p.reflection2}</div>` : ""}
  </div>`).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Pull your first card to begin.</p>" : "";
  return `
    <h2>\u{1F4D3} My Journal, ${state.name}</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your readings save automatically</strong> in this browser, on this device. They won't follow you to a different browser or device though, and clearing your browser's data will erase them, so download your journal now and then for a backup you can keep.</span></div>
    <div class="card">${entries || empty}</div>
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="go({activeTab:'reading', readingStep:'intention', drawnCard:null, cardFlipped:false, intention:'', reflection1:'', reflection2:''})">Pull A New Card</button>
    </div>
  `;
}

function downloadJournal() {
  let text = "DIVINE UNION MESSAGE FROM SPIRIT\nMy Journal, " + state.name + "\n\n";
  if (!state.pulls.length) {
    text += "No entries yet.\n";
  } else {
    [...state.pulls].reverse().forEach(p => {
      text += "== " + p.date + " \u00B7 " + p.card + " ==\n";
      if (p.intention) text += "My intention: " + p.intention + "\n";
      text += "The message: " + p.message + "\n";
      if (p.reflection1) text += "How it landed: " + p.reflection1 + "\n";
      if (p.reflection2) text += "How I'll apply it: " + p.reflection2 + "\n";
      text += "\n";
    });
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-divine-union-messages.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- LEARN MORE ---------- */

function learnHtml() {
  const items = LEARN_LINKS.map(l => {
    const badge = l.tier === "premium" ? `<span class="tier-badge premium">PREMIUM</span>` : `<span class="tier-badge standard">STANDARD</span>`;
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} ${badge}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `<h2>\u2728 Learn More</h2><p>These lessons go deeper into everything this generator touches on.</p>${items}`;
}

/* ---------- ROUTER ---------- */

function render() {
  saveState();
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.activeTab === "reading") content = readingHtml();
  else if (state.activeTab === "journal") content = journalHtml();
  else if (state.activeTab === "learn") content = learnHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

loadState();
render();
</script>
