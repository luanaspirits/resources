  </div>`;
}

}

/* ---------- NAME GATE ---------- */

function renderName() {
  document.getElementById("app").innerHTML = `
    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u{1F52E}</div><div class="topbar-title">The Soul Connection Decoder</div></div>
    <div class="center"><div class="std-pill">STANDARD TIER AND UP</div></div>
    <h1 class="center">Karmic, soulmate, or twin flame?</h1>

    <div class="not-set-in-stone">

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- QUIZ ---------- */

function quizHtml() {
  if (state.quizStage === "grounding") return groundingHtml();
  if (state.quizStage === "results") return resultsHtml();
  return sectionHtml();
}

function groundingHtml() {
  return `
    <h2>\u{1F338} Before You Begin</h2>
    <p>Find a quiet space where you can pause for a moment. Take a deep breath in through your nose, and exhale softly through your mouth. Let your shoulders drop.</p>
    <div class="card ritual">
      <p style="color:var(--text); margin-bottom:0;">Silently or aloud: <em class="hl">\u201CI call upon my Higher Self, my Spirit Team, and the energy of Divine Love and Light to guide me as I move through this checklist. May I see the truth clearly, feel my intuition deeply, and receive these insights with peace and compassion.\u201D</em></p>
    </div>
    <p>For each statement ahead, rate how true it feels for your connection, from 1 star (not at all true) to 5 stars (completely true). Don't overthink it, go with your first intuitive feeling, your body already knows.</p>
    <div class="btn-row"><button class="btn gold" onclick="go({quizStage:'section', currentSection:0})">I'm Ready &rarr;</button></div>
  `;
}

function sectionHtml() {
  const s = QUIZ_SECTIONS[state.currentSection];
  const dots = QUIZ_SECTIONS.map((sec, i) => `<div class="section-dot ${i === state.currentSection ? "active" : i < state.currentSection ? "done" : ""}"></div>`).join("");
  const allRated = s.items.every((item, i) => state.ratings[state.currentSection + "-" + i]);

  const itemsHtml = s.items.map((item, i) => {
    const key = state.currentSection + "-" + i;
    const rating = state.ratings[key] || 0;
    const stars = [1, 2, 3, 4, 5].map(n => `<span class="star ${n <= rating ? "filled" : ""}" onclick="setRating('${key}', ${n})">\u2605</span>`).join("");
    return `<div class="rating-item"><div class="rating-text">${item}</div><div class="stars">${stars}</div></div>`;
  }).join("");

  return `
    <div class="section-progress">SECTION ${state.currentSection + 1} OF ${QUIZ_SECTIONS.length}</div>
    <div class="section-dots">${dots}</div>
    <h2>${s.title}</h2>
    <p><em class="hl">${s.note}</em></p>
    ${itemsHtml}
    <div class="btn-row">
      ${state.currentSection > 0 ? `<button class="btn ghost" onclick="go({currentSection:${state.currentSection - 1}})">&larr; Back</button>` : ""}
      <button class="btn gold" ${allRated ? "" : "disabled"} onclick="nextSection()">${state.currentSection === QUIZ_SECTIONS.length - 1 ? "See My Results" : "Continue"} &rarr;</button>
    </div>
  `;
}

function setRating(key, n) {
  state.ratings[key] = n;
  render();
}

function nextSection() {
  if (state.currentSection === QUIZ_SECTIONS.length - 1) {
    go({ quizStage: "results" });
  } else {
    go({ currentSection: state.currentSection + 1 });
  }
}

function totalScore() {
  let total = 0;
  Object.values(state.ratings).forEach(v => { total += v; });
  return total;
}

function resultsHtml() {
  const score = totalScore();
  const band = RESULT_BANDS.find(b => score >= b.min && score <= b.max) || RESULT_BANDS[RESULT_BANDS.length - 1];
  const pct = Math.round((score / 125) * 100);
  return `
    <div class="card result-card">
      <div class="result-icon">${band.icon}</div>
      <div class="result-score">${score} / 125</div>
      <h2>${band.title}</h2>
      <div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pct}%;"></div></div>
      <p style="margin-bottom:0;">${band.desc}</p>
    </div>
    <div class="not-set-in-stone">
      <p><strong>A gentle reminder:</strong> you cannot fail this. Whether this is your true twin flame, a karmic mirror, or a healing catalyst, this result is support, not a verdict. Only you know the full truth of your own connection.</p>
    </div>
    <div class="card ritual">
      <h3>\u{1F525} Feeling Triggered By This Connection?</h3>
      <p>If anything in this quiz brought something up for you, the Trigger Recovery Roadmap walks you through healing it, step by step, any time you need it.</p>
      <a class="btn gold small" href="https://www.skool.com/union/classroom/49a0a9e5?md=0c334ece5846494695e16845365371ad" target="_blank" rel="noopener">Open Trigger Recovery Roadmap <span class="tier-badge premium">PREMIUM</span></a>
    </div>
    <div class="card ritual">
      <h3>\u{1F9F2} Ready To Call In A True Twin Flame?</h3>
      <p>Become Magnetic To Love helps you become the frequency that attracts real, high-vibe soul connection, instead of chasing it.</p>
      <a class="btn gold small" href="https://www.skool.com/union/classroom/8e5a29d0?md=93ed2637d9604322824e00f6a600d34a" target="_blank" rel="noopener">Open Become Magnetic To Love <span class="tier-badge premium">PREMIUM</span></a>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="go({activeTab:'journal'})">Journal About This &rarr;</button>
      <button class="btn ghost" onclick="go({quizStage:'grounding', currentSection:0, ratings:{}})">Retake The Quiz</button>
    </div>
  `;
}

/* ---------- JOURNAL ---------- */

function journalTabHtml() {
  const score = totalScore();
  const hasResult = score > 0;
  const fields = JOURNAL_PROMPTS.map((q, i) => `
    <div class="journal-q">${q}</div>
    <textarea id="j-${i}">${state.journal[i] || ""}</textarea>
  `).join("");
  return `
    <h2>\u{1F4D3} Journal</h2>
    ${hasResult ? `<p>Your result: <strong style="color:var(--violet-deep);">${(RESULT_BANDS.find(b => score >= b.min && score <= b.max) || RESULT_BANDS[3]).title}</strong> (${score} / 125)</p>` : `<p>Take the quiz first for a more personal reflection, or journal freely below any time.</p>`}
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, come back next week, it'll still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</span></div>
    <div class="card">${fields}
      <button class="btn gold small" onclick="saveJournal()">${state.journalSaved ? "\u2726 Update" : "Save"}</button>
    </div>
    <div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>
  `;
}

function saveJournal() {
  for (let i = 0; i < JOURNAL_PROMPTS.length; i++) {
    state.journal[i] = document.getElementById("j-" + i).value;
  }
  state.journalSaved = true;
  render();
}

function downloadJournal() {
  const score = totalScore();
  let text = "THE SOUL CONNECTION DECODER QUIZ\nMy Journal, " + state.name + "\n\n";
  if (score > 0) {
    const band = RESULT_BANDS.find(b => score >= b.min && score <= b.max) || RESULT_BANDS[3];
    text += "My Result: " + band.title + " (" + score + " / 125)\n\n";
  }
  JOURNAL_PROMPTS.forEach((q, i) => { if (state.journal[i]) text += q + "\n" + state.journal[i] + "\n\n"; });
  if (!Object.keys(state.journal).length) text += "No journal entries yet.\n";
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-soul-connection-decoder-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- CARD PULL ---------- */

function cardPullTabHtml() {
  if (!state.cardDrawn) {
    return `
      <h2 class="center">\u{1F0CF} A Card For Guidance</h2>
      <p class="center">Ground yourself, hold this connection in mind, and pull a card for guidance around it.</p>
      <div class="btn-row" style="justify-content:center;"><button class="btn gold" onclick="drawCard()">Pull A Card &rarr;</button></div>
    `;
  }
  const c = state.cardDrawn;
  if (!state.cardFlipped) {
    return `
      <h2 class="center">Before You See The Meaning...</h2>
      <div class="flip-scene">
        <div class="flip-card">
          <div class="flip-face flip-back"><span style="font-size:28px;color:rgba(255,255,255,0.7);">\u2726</span></div>
          <div class="flip-face flip-front" style="background:linear-gradient(165deg, var(--violet-deep) 0%, var(--violet) 55%, ${c.c2} 135%);">
            <div style="font-size:36px; color:${c.c1};">${c.glyph}</div>
            <div class="card-name">${c.name}</div>
          </div>
        </div>
      </div>
      <p class="center">The card is drawn, still face down. What's your first impression? What do you feel it might be telling you about this connection?</p>
      <div class="card"><textarea id="impression" placeholder="Trust the first thing that comes...">${state.tempImpression}</textarea></div>
      <div class="btn-row" style="justify-content:center;"><button class="btn gold" onclick="revealCard()">Reveal The Meaning</button></div>
    `;
  }
  return `
    <h2 class="center">\u2727 Your Card \u2727</h2>
    <div class="flip-scene">
      <div class="flip-card flipped">
        <div class="flip-face flip-back"><span style="font-size:28px;color:rgba(255,255,255,0.7);">\u2726</span></div>
        <div class="flip-face flip-front" style="background:linear-gradient(165deg, var(--violet-deep) 0%, var(--violet) 55%, ${c.c2} 135%);">
          <div style="font-size:36px; color:${c.c1};">${c.glyph}</div>
          <div class="card-name">${c.name}</div>
          <div class="card-meaning">${c.meaning}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="journal-q">Your first impression, before you saw the meaning:</div>
      <p style="color:var(--text); font-style:italic;">${state.tempImpression || "(none written)"}</p>
      <div class="journal-q">How does this land for you, now that you see the meaning?</div>
      <textarea id="cardReflection">${state.cardReflection || ""}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="saveCardReflection()">${state.cardSaved ? "\u2726 Saved" : "Save Reflection"}</button>
      <button class="btn ghost" onclick="go({cardDrawn:null, cardFlipped:false, tempImpression:'', cardReflection:'', cardSaved:false})">Pull Another Card</button>
    </div>
  `;
}

function drawCard() {
  const card = CARD_DECK[Math.floor(Math.random() * CARD_DECK.length)];
  go({ cardDrawn: card, cardFlipped: false, tempImpression: "" });
}

function revealCard() {
  state.tempImpression = document.getElementById("impression").value;
  go({ cardFlipped: true });
}

function saveCardReflection() {
  state.cardReflection = document.getElementById("cardReflection").value;
  state.cardSaved = true;
  render();
}

/* ---------- SELF-LOVE PRACTICE ---------- */

let breathTimer = null;
const BOX_PHASES = ["Breathe in...", "Hold...", "Breathe out...", "Hold..."];

function selfLoveTabHtml() {
  return `
    <h2>\u{1F338} A Short Self-Love Practice</h2>
    <p>Whatever your result, whatever came up while journaling, this connection ultimately points back to your relationship with yourself. Take two minutes for this before you go.</p>
    <div class="breathe-wrap">
      <div class="breathe-ball" id="breatheBall"></div>
      <div class="breathe-label" id="breatheLabel">Press start when you're ready</div>
      <div class="btn-row"><button class="btn gold" id="breatheBtn" onclick="toggleBreathing()">Start Breathing</button></div>
    </div>
    <div class="card ritual center">
      <p style="margin-bottom:0; color:var(--text); font-family:'Playfair Display', serif; font-style:italic; font-size:16px;">Place a hand on your heart and say: \u201CI am not behind. I am not broken. I am becoming. The love I seek is already within me, and as I heal, it finds its way home to me.\u201D</p>
    </div>
    <div class="btn-row"><button class="btn gold" onclick="markSelfLoveDone()">${state.selfLoveDone ? "\u2726 Practiced Today" : "I Did This"}</button></div>
  `;
}

function toggleBreathing() {
  const ball = document.getElementById("breatheBall");
  const label = document.getElementById("breatheLabel");
  const btn = document.getElementById("breatheBtn");
  if (state.breathing) {
    state.breathing = false; clearTimeout(breathTimer);
    ball.style.transform = "scale(1)"; label.textContent = "Press start when you're ready"; btn.textContent = "Start Breathing";
    return;
  }
  state.breathing = true; btn.textContent = "Stop";
  let phase = 0;
  const runPhase = () => {
    if (!state.breathing) return;
    label.textContent = BOX_PHASES[phase];
    ball.style.transition = "transform 4s ease-in-out";
    if (phase === 0) ball.style.transform = "scale(1.4)";
    else if (phase === 2) ball.style.transform = "scale(1)";
    phase = (phase + 1) % 4;
    breathTimer = setTimeout(runPhase, 4000);
  };
  runPhase();
}

function markSelfLoveDone() {
  state.selfLoveDone = true;
  render();
}

/* ---------- LEARN MORE ---------- */

function learnTabHtml() {
  const items = LEARN_LINKS.map(l => {
    const badge = l.tier === "premium" ? `<span class="tier-badge premium">PREMIUM</span>` : `<span class="tier-badge standard">STANDARD</span>`;
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} ${badge}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `
    <h2>\u2728 Learn More</h2>
    <div class="premium-highlight">
      <h3>Why Members Upgrade To Premium</h3>
      <p style="margin-bottom:10px;">Premium unlocks the deeper roadmaps and full Manifest Your Union course, the exact tools referenced in your results above, so you're not just getting an answer, you're getting a real path forward, whatever this connection turns out to be.</p>
      <a class="btn gold small" href="${PREMIUM_URL}" target="_blank" rel="noopener">View Premium &rarr;</a>
    </div>
    <p>These lessons go deeper into everything this quiz touches on.</p>
    ${items}
  `;
}

/* ---------- ROUTER ---------- */

const STORAGE_KEY = "soul-connection-decoder-v1";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function render() {
  saveState();
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.activeTab === "quiz") content = quizHtml();
  else if (state.activeTab === "journal") content = journalTabHtml();
  else if (state.activeTab === "cardpull") content = cardPullTabHtml();
  else if (state.activeTab === "selflove") content = selfLoveTabHtml();
  else if (state.activeTab === "learn") content = learnTabHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

loadState();
render();
</script>
