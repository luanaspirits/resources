<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Become Your Own Psychic, a course dashboard for connecting with your intuition, reading energy safely, and learning to read for yourself.">
<title>Become Your Own Psychic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #2f1f52; --bg-2: #3d2a6b; --card: rgba(255,255,255,0.09); --card-2: rgba(255,255,255,0.16);
    --text: #f5f1fb; --muted: #c3b3e0; --muted-2: #9a86c4;
    --violet: #a988e8; --violet-deep: #7a5bc4; --periwinkle: #9ab4f0;
    --gold: #d9c48a; --gold-soft: #ecdcae;
    --line: rgba(255,255,255,0.14); --line-strong: rgba(255,255,255,0.28);
  }
  body {
    background: radial-gradient(ellipse at 15% 0%, #5c3fa050 0%, transparent 55%),
                radial-gradient(ellipse at 88% 10%, #9ab4f040 0%, transparent 48%),
                radial-gradient(ellipse at 50% 105%, #c9a8f040 0%, transparent 55%), var(--bg);
    color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; position: relative;
  }
  #sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .spark { position: absolute; border-radius: 50%; background: radial-gradient(circle, #fff, var(--periwinkle) 70%, transparent 100%); animation: twinkle 4.5s ease-in-out infinite; box-shadow: 0 0 6px 1px rgba(255,255,255,0.5); }
  @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(.7);} 50%{opacity:.9;transform:scale(1.3);} }
  #app { position: relative; z-index: 2; max-width: 640px; margin: 0 auto; padding: 0 20px 60px; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: 12px; }
  h1 { font-weight: 700; font-size: 30px; line-height: 1.25; }
  h2 { font-weight: 600; font-size: 22px; }
  h3 { font-weight: 600; font-size: 17px; }
  p { line-height: 1.75; color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
  em.hl { font-style: italic; color: var(--text); }
  .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--text); font-size: 18px; text-align: center; margin: 18px 0; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 24px; margin-bottom: 16px; backdrop-filter: blur(8px); box-shadow: 0 8px 30px rgba(107,79,160,0.06); }
  .card.ritual { background: linear-gradient(150deg, rgba(155,127,212,0.10), rgba(140,168,232,0.10)); border-color: var(--line-strong); }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Jost', sans-serif; font-weight: 700; font-size: 14px; padding: 13px 26px; border-radius: 999px; border: none; cursor: pointer; text-decoration: none; }
  .btn.gold { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; box-shadow: 0 6px 20px rgba(155,127,212,0.35); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line-strong); }
  .btn.ghost:hover { color: var(--text); border-color: var(--violet); }
  .btn.small { padding: 8px 16px; font-size: 12px; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  input[type=text] { width: 100%; background: rgba(0,0,0,0.18); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; font-family: 'Jost', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 16px; }
  input[type=text]::placeholder { color: var(--muted-2); }
  textarea { width: 100%; background: rgba(0,0,0,0.18); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14.5px; padding: 14px; resize: vertical; min-height: 85px; margin-bottom: 14px; }
  .journal-q { font-size: 14px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .center { text-align: center; }
  .topbar-left { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 10px; }
  .topbar-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 16px rgba(155,127,212,0.4); flex-shrink: 0; }
  .topbar-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: var(--text); }
  .std-pill { display: inline-block; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; font-family: 'Jost', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.5px; border-radius: 999px; padding: 6px 14px; margin-bottom: 14px; }

  /* Dashboard layout */
  .main { max-width: 640px; margin: 0 auto; }

  .topbar-brand-row-spacer { }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
  .tab { font-family: 'Jost', sans-serif; font-weight: 600; font-size: 13px; background: var(--card); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 10px 18px; cursor: pointer; }
  .tab:hover { color: var(--text); border-color: var(--violet); }
  .tab.active { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #2a1a4a; border-color: transparent; font-weight: 700; }

  .option-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
  .option-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
  .option-card:hover { border-color: var(--violet); background: var(--card-2); }
  .option-icon { font-size: 22px; flex-shrink: 0; }
  .option-text { flex: 1; }
  .option-text .t { font-family: 'Playfair Display', serif; font-size: 15.5px; font-weight: 600; color: var(--text); }
  .option-check { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--muted-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
  .option-check.done { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); border-color: transparent; }

  .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .prog-bg { flex: 1; height: 6px; background: rgba(107,79,160,0.18); border-radius: 999px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--periwinkle)); border-radius: 999px; transition: width 0.3s ease; }
  .prog-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--periwinkle); }

  .topnav-wrap { position: sticky; top: 0; z-index: 10; padding: 16px 0 14px; margin-bottom: 4px; }
  .topnav-brand-row { display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; opacity: 0.9; margin-bottom: 14px; }
  .topnav-brand-row .icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .topnav-brand-row .name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; color: var(--text); }
  .nav-link { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted-2); cursor: pointer; background: none; border: none; padding: 3px 0; }
  .nav-link:hover { color: var(--periwinkle); }

  .lesson-badge { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--muted-2); margin-bottom: 8px; }
  .lesson-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; }
  .tk-item { display: flex; gap: 10px; margin-bottom: 9px; font-size: 14px; color: var(--text); line-height: 1.6; }
  .tk-spark { color: var(--gold); flex-shrink: 0; }
  .link-btn { display: inline-block; margin-top: 10px; color: var(--periwinkle); font-size: 13px; text-decoration: none; border-bottom: 1px solid var(--violet); }

  .steps { list-style: none; margin-bottom: 16px; }
  .steps li { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; color: var(--muted); }
  .steps .dot { flex-shrink: 0; color: var(--gold); }
  .steps strong { color: var(--text); }

  .choice-list { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .choice { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; cursor: pointer; font-size: 15px; color: var(--text); text-align: left; }
  .choice:hover { border-color: var(--violet); background: rgba(155,127,212,0.06); }
  .choice.selected { border-color: var(--violet); background: rgba(155,127,212,0.14); }

  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; justify-content: center; }
  .chip { background: rgba(255,255,255,0.08); border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px; font-size: 13.5px; color: var(--muted); cursor: pointer; }
  .chip:hover { border-color: var(--violet); }
  .chip.selected { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); color: #fff; border-color: transparent; font-weight: 500; }

  /* ESP Practice */
  .esp-score-card { text-align: center; background: linear-gradient(150deg, rgba(169,136,232,0.16), rgba(154,180,240,0.12)); border-color: var(--line-strong); }
  .esp-score-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 6px; }
  .esp-score-value { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text); }
  .esp-chip { font-size: 16px; padding: 14px 18px; }
  .esp-chip.esp-correct { background: linear-gradient(135deg, #9BD88C, #4E9E5F); color: #fff; border-color: transparent; }
  .esp-chip.esp-wrong { background: rgba(217,120,120,0.25); border-color: rgba(217,120,120,0.6); color: var(--text); }
  .esp-feedback { text-align: center; font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; margin-top: 16px; }
  .esp-hit { color: var(--periwinkle); }
  .esp-miss { color: var(--muted-2); }

  .lesson-item, .accordion-item { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; cursor: pointer; margin-bottom: 10px; }
  .lesson-item:hover, .accordion-item:hover { border-color: var(--violet); }
  .lesson-item .t, .accordion-item .t { font-family: 'Playfair Display', serif; font-size: 15.5px; font-weight: 600; color: var(--text); }
  .lesson-item .s { font-size: 12.5px; color: var(--muted-2); }
  .accordion-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }

  /* Interactive concept cards */
  .concept-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
  .concept-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: border-color 0.2s ease, background 0.2s ease; }
  .concept-card:hover { border-color: var(--violet); }
  .concept-card.open { background: linear-gradient(150deg, rgba(169,136,232,0.14), rgba(154,180,240,0.10)); border-color: var(--violet); }
  .concept-card.done .concept-title { color: var(--periwinkle); }
  .concept-head { display: flex; align-items: center; gap: 12px; }
  .concept-icon { font-size: 22px; flex-shrink: 0; }
  .concept-title { font-family: 'Playfair Display', serif; font-size: 15.5px; font-weight: 600; color: var(--text); flex: 1; }
  .concept-check { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--muted-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; transition: all 0.2s ease; }
  .concept-check.done { background: linear-gradient(135deg, var(--violet), var(--periwinkle)); border-color: transparent; }
  .concept-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line-strong); font-size: 14px; color: var(--muted); line-height: 1.7; }
  .hint { text-align: center; font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--muted-2); letter-spacing: 0.5px; margin-top: 8px; }

  /* Clair flip cards */
  .clair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 22px 0; }
  @media (max-width: 480px) { .clair-grid { grid-template-columns: 1fr; } }
  .clair-flip-scene { perspective: 1000px; }
  .clair-flip-card { position: relative; width: 100%; height: 190px; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(.2,.8,.2,1); cursor: pointer; }
  .clair-flip-card.flipped { transform: rotateY(180deg); }
  .clair-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; text-align: center; box-shadow: 0 10px 26px rgba(47,31,82,0.35); }
  .clair-front .clair-icon { font-size: 32px; margin-bottom: 8px; }
  .clair-name-small { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #fff; }
  .clair-tap { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.65); margin-top: 8px; text-transform: uppercase; }
  .clair-back { transform: rotateY(180deg); }
  .clair-tagline { font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 1.5px; color: rgba(255,255,255,0.75); text-transform: uppercase; margin-bottom: 6px; }
  .clair-desc { font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; color: #fff; margin-bottom: 8px; line-height: 1.4; }
  .clair-examples { font-size: 10.5px; color: rgba(255,255,255,0.85); line-height: 1.6; text-align: left; }

  /* Breathing */
  .breathe-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 0 8px; }
  .breathe-ball { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff, var(--periwinkle) 45%, var(--violet) 100%); box-shadow: 0 0 50px rgba(155,127,212,0.4); transition: transform 4s ease-in-out; margin-bottom: 20px; }
  .breathe-label { font-family: 'Playfair Display', serif; font-size: 18px; min-height: 24px; text-align: center; color: var(--text); }

  /* Card pull */
  .calling-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
  .shuffle-stage { position: relative; height: 230px; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
  .deck-card { position: absolute; width: 130px; height: 194px; border-radius: 14px; background: linear-gradient(160deg, var(--violet-deep), var(--violet)); border: 1.5px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(107,79,160,0.35); transition: transform 0.6s cubic-bezier(.2,.8,.2,1); }
  .deck-card.shuffling { animation: shuffleLoop 1.4s ease-in-out infinite; }
  @keyframes shuffleLoop { 0%,100%{transform:translate(0,0) rotate(0deg);} 25%{transform:translate(-40px,-6px) rotate(-7deg);} 50%{transform:translate(0,0) rotate(0deg);} 75%{transform:translate(40px,-6px) rotate(7deg);} }
  .flip-scene { perspective: 1200px; display: flex; justify-content: center; margin-bottom: 22px; }
  .flip-card { position: relative; width: 220px; height: 320px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(.2,.8,.2,1); }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; text-align: center; }
  .flip-back { background: linear-gradient(160deg, var(--violet-deep), var(--violet)); border: 1.5px solid rgba(255,255,255,0.5); }
  .flip-front { transform: rotateY(180deg); }
  .card-arcana { font-family: 'DM Mono', monospace; font-size: 9.5px; letter-spacing: 2px; color: rgba(255,255,255,0.7); margin-top: 8px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 25px; font-weight: 600; color: #fff; margin-top: 6px; line-height: 1.15; }
  .card-meaning { font-family: 'Jost', sans-serif; font-size: 13px; color: rgba(255,255,255,0.9); font-style: italic; margin-top: 12px; line-height: 1.5; }

  /* Quiz */
  .quiz-progress { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted-2); text-align: center; margin-bottom: 8px; }
  .clair-result-card { text-align: center; padding: 30px 24px; }
  .clair-result-icon { font-size: 54px; margin-bottom: 14px; }

  .entry { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 16px; }
  .entry:last-child { border: none; margin: 0; padding: 0; }
  .entry .tt { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .entry .meta { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); margin-bottom: 10px; }
  .entry .q { font-size: 12.5px; color: var(--muted-2); margin-bottom: 2px; }
  .entry .a { font-size: 14px; color: var(--text); margin-bottom: 8px; }

  .save-reminder { background: rgba(201,164,78,0.10); border: 1px solid var(--gold); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }

  .video-item { display: flex; gap: 14px; align-items: center; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
  .video-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--violet), var(--periwinkle)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .video-item .t { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .video-item .s { font-size: 12px; color: var(--muted-2); margin-top: 3px; }
  .video-item a { text-decoration: none; }
  .tier-badge { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 1px; padding: 3px 8px; border-radius: 999px; font-weight: 500; }
  .tier-badge.premium { background: rgba(217,196,138,0.22); color: var(--gold); border: 1px solid rgba(217,196,138,0.4); }
  .tier-badge.standard { background: rgba(154,180,240,0.18); color: var(--periwinkle); border: 1px solid rgba(154,180,240,0.4); }

  .cta-pill { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 12px 18px; font-size: 12.5px; color: var(--muted); margin-top: 18px; }
  .cta-pill a { color: var(--gold); font-weight: 600; text-decoration: none; white-space: nowrap; }

  .site-footer { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); text-align: center; }
  .site-footer .brand { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; color: var(--text); }
  .site-footer .brand em { font-style: italic; color: var(--gold); }
  .site-footer .links { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); line-height: 1.9; }
  .site-footer a { color: var(--muted-2); text-decoration: none; }
</style>

<div id="app"></div>

<script>
/* ---------- AMBIENT SPARKLES ---------- */
(function initSparkles() {
  const wrap = document.getElementById("sparkles");
  for (let i = 0; i < 18; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    const size = 2 + Math.random() * 4;
    s.style.width = size + "px"; s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%"; s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = (Math.random() * 4.5) + "s";
    wrap.appendChild(s);
  }
})();

/* ---------- DATA: TAROT DECK (78 cards) ---------- */

const DECK = [
  { id: "thefool", name: "The Fool", arcana: "Major Arcana", glyph: "\u2726", c1: "#F0A6D8", c2: "#D96BA8", meaning: "New beginnings, leap of faith, innocence, spontaneity." },
  { id: "themagician", name: "The Magician", arcana: "Major Arcana", glyph: "\u2737", c1: "#B88CED", c2: "#7B54C4", meaning: "Manifestation, power, resourcefulness, aligned action." },
  { id: "thehighpriestess", name: "The High Priestess", arcana: "Major Arcana", glyph: "\u263E", c1: "#7EECD4", c2: "#2FA98C", meaning: "Intuition, inner knowing, mystery, the subconscious." },
  { id: "theempress", name: "The Empress", arcana: "Major Arcana", glyph: "\u2740", c1: "#F5C265", c2: "#E09A3E", meaning: "Abundance, nurturing, creativity, fertility, sensuality." },
  { id: "theemperor", name: "The Emperor", arcana: "Major Arcana", glyph: "\u2666", c1: "#A8C8F0", c2: "#5E8CD4", meaning: "Structure, authority, leadership, stable foundations." },

function lessonHtml(lesson) {
  const idx = LESSONS.findIndex(l => l.id === lesson.id);
  const allDone = lesson.concepts.every((c, i) => !!state.completedLessons[lesson.id + "-" + i]);
  const nextMap = { "grounding-protection": { id: "reading-state", label: "Reading State" }, "reading-state": { id: "boundaries", label: "Energetic Boundaries" }, "boundaries": { id: "quiz", label: "Find Your Dominant Clair" } };
  const next = nextMap[lesson.id];

  const cards = lesson.concepts.map((c, i) => {
    const open = state.openConcept === lesson.id + "-" + i;
    const done = !!state.completedLessons[lesson.id + "-" + i];
    return `<div class="concept-card ${open ? "open" : ""} ${done ? "done" : ""}" onclick="toggleConcept('${lesson.id}-${i}')">
      <div class="concept-head">
        <span class="concept-icon">${c.icon}</span>
        <span class="concept-title">${c.title}</span>
        <span class="concept-check ${done ? "done" : ""}">${done ? "\u2713" : ""}</span>
      </div>
      ${open ? `<div class="concept-body">${c.body}</div>` : ""}
    </div>`;
  }).join("");

  const existingEntry = state.journal.find(j => j.type === "lesson-" + lesson.id);

  return `
    <div class="back-link" onclick="selectTab('foundations')">&larr; Back to Foundations</div>
    <div class="lesson-badge">FOUNDATIONS ${idx + 1} OF ${LESSONS.length}</div>
    <h2>${lesson.icon} ${lesson.title}</h2>
    <p>${lesson.intro}</p>
    <div class="concept-grid">${cards}</div>
    ${allDone ? "" : `<p class="hint">Tap each card above to open it and check it off.</p>`}
    <div class="section-label">\u{1F338} Reflect</div>
    <div class="card">
      <div class="journal-q">${lesson.journalPrompt}</div>
      <textarea id="lesson-journal-${lesson.id}">${existingEntry ? existingEntry.answer : ""}</textarea>
      <button class="btn gold small" onclick="saveLessonJournal('${lesson.id}')">${existingEntry ? "\u2726 Update Reflection" : "Save Reflection"}</button>
    </div>
    ${allDone ? `<div class="btn-row">${next ? `<button class="btn gold" onclick="selectItem('${next.id}')">Next: ${next.label} &rarr;</button>` : ""}</div>` : ""}
  `;
}

function saveLessonJournal(lessonId) {
  const lesson = LESSONS.find(l => l.id === lessonId);
  const val = document.getElementById("lesson-journal-" + lessonId).value;
  state.journal = state.journal.filter(j => j.type !== "lesson-" + lessonId);
  state.journal.push({ type: "lesson-" + lessonId, date: new Date().toLocaleString(), lessonTitle: lesson.title, prompt: lesson.journalPrompt, answer: val });
  render();
}

function toggleConcept(key) {
  const wasOpen = state.openConcept === key;
  state.completedLessons[key] = true;
  state.openConcept = wasOpen ? null : key;
  render();
}

function answerQuiz(clair) {
  const answers = [...state.quizAnswers, clair];
  if (state.quizIndex < CLAIR_QUIZ.length - 1) {
    go({ quizAnswers: answers, quizIndex: state.quizIndex + 1 });
  } else {
    const tally = {};
    answers.forEach(c => { tally[c] = (tally[c] || 0) + 1; });
    let winner = answers[0];
    let max = 0;
    Object.keys(tally).forEach(k => { if (tally[k] > max) { max = tally[k]; winner = k; } });
    go({ quizAnswers: answers, quizResult: winner });
  }
}

function espPracticeHtml() {
  const pct = state.espTotal > 0 ? Math.round((state.espCorrect / state.espTotal) * 100) : 0;

  const symbolButtons = ZENER_SYMBOLS.map(s => {
    const selected = state.espGuess === s.id;
    const isCard = state.espCurrentCard === s.id;
    let extra = "";
    if (state.espRevealed) {
      if (isCard) extra = " esp-correct";
      else if (selected) extra = " esp-wrong";
    } else if (selected) {
      extra = " selected";
    }
    return `<div class="chip esp-chip${extra}" onclick="${state.espRevealed ? "" : `guessEsp('${s.id}')`}">${s.symbol} ${s.name}</div>`;
  }).join("");

  const revealText = state.espRevealed
    ? (state.espGuess === state.espCurrentCard
        ? `<div class="esp-feedback esp-hit">\u2726 Hit! It was ${ZENER_SYMBOLS.find(s => s.id === state.espCurrentCard).name}.</div>`
        : `<div class="esp-feedback esp-miss">It was ${ZENER_SYMBOLS.find(s => s.id === state.espCurrentCard).name}. Keep going.</div>`)
    : "";

  return `
    <div class="back-link" onclick="selectTab('practice')">&larr; Back to Practice</div>
    <div class="lesson-badge">PRACTICE TOOLS</div>
    <h2>\u{1F3AF} ESP Accuracy Practice</h2>
    <p>These are based on real ESP test cards used in psychic research (Zener cards). With 5 symbols, pure chance alone would get you about 20% correct. Anything meaningfully higher over many rounds is worth noticing.</p>
    <div class="card esp-score-card">
      <div class="esp-score-label">YOUR SCORE</div>
      <div class="esp-score-value">${state.espCorrect} / ${state.espTotal} correct${state.espTotal > 0 ? ` (${pct}%)` : ""}</div>
    </div>
    <p class="center" style="margin-top:18px;">Guess the hidden symbol before you reveal it.</p>
    <div class="chip-grid">${symbolButtons}</div>
    ${revealText}
    <div class="btn-row" style="justify-content:center;">
      ${!state.espRevealed
        ? `<button class="btn gold" style="${state.espGuess ? "" : "opacity:0.45; pointer-events:none;"}" onclick="revealEsp()">Reveal Card</button>`
        : `<button class="btn gold" onclick="nextEsp()">Next Card &rarr;</button>`}
      <button class="btn ghost" onclick="resetEsp()">Reset Score</button>
    </div>
    ${state.espTotal >= 5 ? `<div class="btn-row"><button class="btn ghost" onclick="saveEspScore()">Save Score To Journal</button></div>` : ""}
  `;
}

function guessEsp(id) {
  state.espGuess = id;
  if (!state.espCurrentCard) state.espCurrentCard = ZENER_SYMBOLS[Math.floor(Math.random() * ZENER_SYMBOLS.length)].id;
  render();
}

function revealEsp() {
  state.espRevealed = true;
  state.espTotal++;
  if (state.espGuess === state.espCurrentCard) state.espCorrect++;
  state.completedLessons["esp-practice"] = true;
  render();
}

function nextEsp() {
  state.espCurrentCard = ZENER_SYMBOLS[Math.floor(Math.random() * ZENER_SYMBOLS.length)].id;
  state.espGuess = null;
  state.espRevealed = false;
  render();
}

function resetEsp() {
  state.espCorrect = 0;
  state.espTotal = 0;
  state.espCurrentCard = null;
  state.espGuess = null;
  state.espRevealed = false;
  render();
}

function saveEspScore() {
  const pct = Math.round((state.espCorrect / state.espTotal) * 100);
  state.journal.push({ type: "esp-practice", date: new Date().toLocaleString(), correct: state.espCorrect, total: state.espTotal, pct: pct });
  render();
}

/* ---------- MY PRACTICE JOURNAL ---------- */

function journalHtml() {
  const sorted = [...state.journal].reverse();
  const entries = sorted.map(e => {
    if (e.type === "card-pull") {
      return `<div class="entry">
        <div class="tt">\u{1F0CF} ${e.card}</div>
        <div class="meta">${e.date} &middot; ${e.arcana} &middot; Calling in: ${e.calling}</div>
        <div class="q">My first impression</div><div class="a">${e.impression || "(none written)"}</div>
        <div class="q">Official meaning</div><div class="a">${e.officialMeaning}</div>
        ${e.reflection ? `<div class="q">My reflection</div><div class="a">${e.reflection}</div>` : ""}
      </div>`;
    }
    if (e.type === "muscle-testing") {
      return `<div class="entry">
        <div class="tt">\u{1FAB4} Muscle Testing Practice</div>
        <div class="meta">${e.date}</div>
        ${e.a0 ? `<div class="q">Calibration</div><div class="a">${e.a0}</div>` : ""}
        ${e.a1 ? `<div class="q">My question</div><div class="a">${e.a1}</div>` : ""}
        ${e.a2 ? `<div class="q">Reflection</div><div class="a">${e.a2}</div>` : ""}
      </div>`;
    }
    if (e.type === "esp-practice") {
      return `<div class="entry">
        <div class="tt">\u{1F3AF} ESP Accuracy Practice</div>
        <div class="meta">${e.date}</div>
        <div class="q">Score</div><div class="a">${e.correct} / ${e.total} correct (${e.pct}%)</div>
      </div>`;
    }
    if (e.type && e.type.indexOf("lesson-") === 0) {
      return `<div class="entry">
        <div class="tt">\u{1F338} ${e.lessonTitle}</div>
        <div class="meta">${e.date}</div>
        <div class="q">${e.prompt}</div><div class="a">${e.answer || "(none written)"}</div>
      </div>`;
    }
    if (e.type === "clairs-reflection") {
      return `<div class="entry">
        <div class="tt">\u{1F52E} Explore The Psychic Clairs</div>
        <div class="meta">${e.date}</div>
        <div class="q">My top three dominant clairs</div><div class="a">${e.topThree || "(none written)"}</div>
        <div class="q">How my intuition has spoken to me</div><div class="a">${e.spoken || "(none written)"}</div>
      </div>`;
    }
    if (e.type === "self-reading-journal") {
      return `<div class="entry">
        <div class="tt">\u{1F4D6} Self-Reading Walkthrough</div>
        <div class="meta">${e.date}</div>
        <div class="q">My question</div><div class="a">${e.question || "(none written)"}</div>
        <div class="q">What came through</div><div class="a">${e.cameThrough || "(none written)"}</div>
      </div>`;
    }
    return "";
  }).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Try a card pull or ESP practice to start filling this in.</p>" : "";
  return `
    <div class="lesson-badge">MY PRACTICE JOURNAL</div>
    <h2>\u{1F4D3} My Practice Journal, ${state.name}</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, come back next week, it'll still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</span></div>
    <div class="card">${entries || empty}</div>
    <div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>
  `;
}

function downloadJournal() {
  let text = "BECOME YOUR OWN PSYCHIC\nMy Practice Journal, " + state.name + "\n\n";
  if (!state.journal.length) {
    text += "No entries yet.\n";
  } else {
    [...state.journal].reverse().forEach(e => {
      if (e.type === "card-pull") {
        text += "== " + e.date + " \u00B7 Card Pull: " + e.card + " (" + e.arcana + ") ==\n";
        text += "Calling in: " + e.calling + "\n";
        text += "My first impression: " + (e.impression || "(none written)") + "\n";
        text += "Official meaning: " + e.officialMeaning + "\n";
        if (e.reflection) text += "My reflection: " + e.reflection + "\n";
        text += "\n";
      } else if (e.type === "muscle-testing") {
        text += "== " + e.date + " \u00B7 Muscle Testing Practice ==\n";
        if (e.a0) text += "Calibration: " + e.a0 + "\n";
        if (e.a1) text += "My question: " + e.a1 + "\n";
        if (e.a2) text += "Reflection: " + e.a2 + "\n";
        text += "\n";
      } else if (e.type === "esp-practice") {
        text += "== " + e.date + " \u00B7 ESP Accuracy Practice ==\n";
        text += "Score: " + e.correct + " / " + e.total + " correct (" + e.pct + "%)\n\n";
      } else if (e.type && e.type.indexOf("lesson-") === 0) {
        text += "== " + e.date + " \u00B7 " + e.lessonTitle + " ==\n";
        text += e.prompt + "\n" + (e.answer || "(none written)") + "\n\n";
      } else if (e.type === "clairs-reflection") {
        text += "== " + e.date + " \u00B7 Explore The Psychic Clairs ==\n";
        text += "My top three dominant clairs: " + (e.topThree || "(none written)") + "\n";
        text += "How my intuition has spoken to me: " + (e.spoken || "(none written)") + "\n\n";
      } else if (e.type === "self-reading-journal") {
        text += "== " + e.date + " \u00B7 Self-Reading Walkthrough ==\n";
        text += "My question: " + (e.question || "(none written)") + "\n";
        text += "What came through: " + (e.cameThrough || "(none written)") + "\n\n";
      }
    });
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-intuition-practice-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- ROUTER ---------- */

const STORAGE_KEY = "become-your-own-psychic-v1";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function render() {
  saveState();
  if (state.screen === "name") {
    renderName();
    return;
  }
  const inner = mainContentHtml();
  document.getElementById("app").innerHTML = `
    ${topNav()}
    <div class="main">${inner}</div>
    ${footer()}
  `;
}

loadState();
render();
</script>
