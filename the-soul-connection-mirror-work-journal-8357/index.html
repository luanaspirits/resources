<html lang="en">
<head>

<title>The Soul Connection Mirror Work Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #2a1640; --card: rgba(255,255,255,0.07); --card-2: rgba(255,255,255,0.12);
    --text: #f5eefb; --muted: #c2aed8; --muted-2: #9880b8;
    --gold: #c9a548; --gold-soft: #e8d5a0; --mirror: #cfd8e8;
    --line: rgba(255,255,255,0.14); --line-strong: rgba(255,255,255,0.26);
  }
  body {
    background: radial-gradient(ellipse at 15% 0%, #4a2c6e60 0%, transparent 55%),
                radial-gradient(ellipse at 88% 10%, #cfd8e830 0%, transparent 48%),
                radial-gradient(ellipse at 50% 105%, #c9a54830 0%, transparent 55%), var(--bg);
    color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; position: relative;
  }
  #sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .spark { position: absolute; border-radius: 50%; background: radial-gradient(circle, #fff, var(--mirror) 70%, transparent 100%); animation: twinkle 4.5s ease-in-out infinite; box-shadow: 0 0 6px 1px rgba(255,255,255,0.4); }
  @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.7);} 50%{opacity:.8;transform:scale(1.25);} }
  #app { position: relative; z-index: 2; max-width: 660px; margin: 0 auto; padding: 0 20px 60px; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: 12px; }
  h1 { font-weight: 700; font-size: 30px; line-height: 1.25; }
  h2 { font-weight: 600; font-size: 22px; }
  h3 { font-weight: 600; font-size: 17px; }
  p { line-height: 1.75; color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
  em.hl { font-style: italic; color: var(--gold-soft); }
  .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold-soft); font-size: 18px; text-align: center; margin: 18px 0; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .center { text-align: center; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 24px; margin-bottom: 16px; backdrop-filter: blur(8px); }
  .card.ritual { background: linear-gradient(150deg, rgba(201,165,72,0.12), rgba(207,216,232,0.08)); border-color: var(--line-strong); }
  .safety-box { background: rgba(207,107,138,0.10); border: 1px solid rgba(207,107,138,0.3); border-left: 3px solid #c96b8a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .safety-box p { font-size: 13px; color: #e8b8c8; line-height: 1.75; margin: 0; }
  .safety-box strong { color: #f0d0da; }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Jost', sans-serif; font-weight: 700; font-size: 14px; padding: 13px 26px; border-radius: 999px; border: none; cursor: pointer; text-decoration: none; }
  .btn.gold { background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #2a1640; box-shadow: 0 6px 20px rgba(201,165,72,0.3); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line-strong); }
  .btn.ghost:hover { color: var(--text); border-color: var(--gold); }
  .btn.small { padding: 8px 16px; font-size: 12px; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  input[type=text] { width: 100%; background: rgba(0,0,0,0.18); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; font-family: 'Jost', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 16px; }
  input[type=text]::placeholder { color: var(--muted-2); }
  textarea { width: 100%; background: rgba(0,0,0,0.18); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14.5px; padding: 14px; resize: vertical; min-height: 85px; margin-bottom: 14px; }
  .journal-q { font-size: 14px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .premium-pill { display: inline-block; background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #2a1640; font-family: 'Jost', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.5px; border-radius: 999px; padding: 6px 14px; margin-bottom: 14px; }
  .topbar-left { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 10px; }
  .topbar-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--gold-soft), var(--mirror)); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 16px rgba(201,165,72,0.35); flex-shrink: 0; }
  .topbar-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: var(--text); }

  .topnav-wrap { position: sticky; top: 0; z-index: 10; padding: 16px 0 12px; }
  .topnav-brand { display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; opacity: 0.9; margin-bottom: 14px; }
  .topnav-brand .icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--gold-soft), var(--mirror)); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .topnav-brand .name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; color: var(--text); }
  .tabs { display: flex; gap: 6px; overflow-x: auto; justify-content: center; flex-wrap: wrap; }
  .tab { flex-shrink: 0; font-family: 'Jost', sans-serif; font-weight: 600; font-size: 12.5px; background: var(--card); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 9px 16px; cursor: pointer; }
  .tab:hover { color: var(--text); border-color: var(--gold); }
  .tab.active { background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #2a1640; border-color: transparent; font-weight: 700; }

  .step-progress { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--muted-2); text-align: center; margin-bottom: 8px; }
  .step-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); }
  .step-dot.active { background: var(--gold); width: 20px; border-radius: 4px; }
  .step-dot.done { background: var(--mirror); }

  .accordion-item { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; cursor: pointer; margin-bottom: 10px; }
  .accordion-item:hover { border-color: var(--gold); }
  .accordion-item .t { font-family: 'Playfair Display', serif; font-size: 15.5px; font-weight: 600; color: var(--text); }
  .accordion-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 13.5px; }

  .entry { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 16px; }
  .entry:last-child { border: none; margin: 0; padding: 0; }
  .entry .tt { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--gold-soft); margin-bottom: 2px; }
  .entry .meta { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); margin-bottom: 10px; }
  .entry .q { font-size: 12.5px; color: var(--muted-2); margin-bottom: 2px; }
  .entry .a { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .save-reminder { background: rgba(201,165,72,0.10); border: 1px solid var(--gold); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }

  .link-item { display: flex; gap: 14px; align-items: center; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; text-decoration: none; }
  .link-icon { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg, var(--gold-soft), var(--mirror)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .link-item .t { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .link-item .s { font-size: 12px; color: var(--muted-2); margin-top: 3px; }
  .tier-badge { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 1px; padding: 3px 8px; border-radius: 999px; font-weight: 500; background: rgba(201,165,72,0.18); color: var(--gold); border: 1px solid rgba(201,165,72,0.4); }

  .back-link { display: inline-block; color: var(--muted-2); font-size: 13px; margin-bottom: 16px; cursor: pointer; }
  .back-link:hover { color: var(--text); }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; }

  .site-footer { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); text-align: center; }
  .site-footer .brand { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; color: var(--text); }
  .site-footer .brand em { font-style: italic; color: var(--gold-soft); }
  .site-footer .links { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); line-height: 1.9; }
  .site-footer a { color: var(--muted-2); text-decoration: none; }
</style>
</head>

<script>
/* ---------- AMBIENT SPARKLES ---------- */

  const wrap = document.getElementById("sparkles");

/* ---------- DATA ---------- */

const LEARN_LINKS = [
  { icon: "\u{1F49E}", title: "Fragmentation, Parts & The Inner Child", subtitle: "Why trauma splits us into parts, and why that makes healthy love feel hard to receive.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=da82dd8abc014cd98ca3d3de9e4a2a86" },

  { icon: "\u{1F5FA}", title: "Mapping Your Love Wounds + Beliefs", subtitle: "Trace what's getting activated back to its root, so you're healing the real thing.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=a598f6013b3643afb7ac731385882582" },
  { icon: "\u{1F4DC}", title: "Why You Chose This Path: Soul Contracts", subtitle: "From the Soul Connection module, understand the deeper agreement behind this connection.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=b0dc61e87e5f4c6ca30db7de7be7eaee" },
  { icon: "\u267B", title: "Karmic Patterns: How To Break The Cycle", subtitle: "From the Soul Connection module, stop repeating the same lesson with different people.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=98b196f184a74fd084c45fabe9d1f949" },
  { icon: "\u{1F54A}", title: "Releasing Attachments & Surrendering", subtitle: "From the Soul Connection module, loosen the grip without abandoning yourself.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=327c624f2a9840f084b253bb6890c92d" },
  { icon: "\u{1F30C}", title: "Separation Consciousness vs. Unity Consciousness", subtitle: "From the Soul Connection module, the shift in perspective that changes everything.", url: "https://www.skool.com/union/classroom/6bd2fa96?md=548c0df49c514494aeaaa49f57fd1426" }

/* ---------- STATE ---------- */

let state = {
  name: "", screen: "name",
  activeTab: "start", decodeStep: 0,
  current: {}, openStartConcept: null, openType: null,
  savedConnections: [], openEntry: null, openLearnLink: null
};

function go(patch) { state = { ...state, ...patch }; render(); }

/* ---------- SHARED CHROME ---------- */

function topNav() {
  const tabs = [
    { id: "start", label: "Start Here" },
    { id: "types", label: "Types Of Connections" },
    { id: "decode", label: "Decode A Connection" },
    { id: "journal", label: "My Journal" },
    { id: "learn", label: "Learn More" }
  ];
  return `<div class="topnav-wrap">
    <div class="topnav-brand" onclick="go({activeTab:'start'})"><div class="icon">\u{1FA9E}</div><div class="name">Soul Connection Mirror Work</div></div>
    <div class="tabs">${tabs.map(t => `<div class="tab ${state.activeTab === t.id ? "active" : ""}" onclick="selectTab('${t.id}')">${t.label}</div>`).join("")}</div>
  </div>`;
}

function selectTab(id) {
  const patch = { activeTab: id };
  if (id === "decode") { patch.decodeStep = 0; patch.current = {}; }
  go(patch);
}

function footer() {
  return `<div class="site-footer">
    <div class="brand">Luana <em>Spirits</em></div>
    <div class="links">
      <a href="mailto:luana@luanaspirits.com">luana@luanaspirits.com</a> &middot;
      <a href="https://docs.google.com/document/d/12oUQEXXesDmVw_XEZH-GEc8NVbtFYyLYf3359hvxyFE/edit?usp=sharing" target="_blank" rel="noopener">Privacy Policy</a> &middot;
      <a href="https://docs.google.com/document/d/1i395On2ZByesCyRaIDocu1aIguhVxuHBQ1l_nPfVReQ/edit?usp=sharing" target="_blank" rel="noopener">Terms &amp; Conditions</a> &middot; &copy; 2026
    </div>
  </div>`;
}

/* ---------- NAME GATE ---------- */

function renderName() {
  document.getElementById("app").innerHTML = `
    <div class="topbar-left" style="margin-top:36px;"><div class="topbar-icon">\u{1FA9E}</div><div class="topbar-title">The Soul Connection Mirror Work Journal</div></div>
    <div class="center"><div class="premium-pill">PREMIUM</div></div>
    <h1 class="center">Decode what this connection is really showing you.</h1>
    <p class="center">A guided journal for twin flames, soulmates, and spiritually awakened women, to explore attraction, activation, and what a connection is here to teach you, without a shred of self-blame.</p>
    <div class="tagline">What you admire is yours to reclaim. What repels you is a wound asking for love, not proof of fault.</div>
    <div class="card">
      <h3>What should I call you?</h3>
      <input type="text" id="nameInput" placeholder="Your first name" />
      <button class="btn gold" onclick="submitName()">Begin</button>
    </div>
    ${footer()}
  `;
}

function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  go({ name: val || "beautiful soul", screen: "dashboard" });
}

/* ---------- START HERE ---------- */

const START_CONCEPTS = [
  { icon: "\u2728", title: "Attraction & Reowning", body: "On a soul level, what you deeply admire in someone else already exists within you. If you're drawn to someone's charisma, their warmth, their boldness, it's often a sign that quality is already inside you, waiting to be reclaimed and expressed more fully. This connection isn't handing you something foreign, it's reflecting something you're ready to own." },
  { icon: "\u{1FAA9}", title: "Repulsion & Disowned Parts", body: "When a trait or quality about someone irritates or triggers you, it's worth gently asking: is this a part of myself I've disowned? If you're triggered by people who seek attention, it might be because some part of you is afraid to want attention too, so you've buried that desire, and now react strongly when you see someone else expressing it freely. This is called projection, and it's actually a doorway back to a disowned part of yourself, not a flaw." },
  { icon: "\u{1F49E}", title: "When It's Actually A Wound", body: "Sometimes what repelled you wasn't a trait at all, it was how you were treated. Real disrespect, dismissiveness, or harm is not a reflection of something you're doing too, and it is never your fault. That kind of pain usually touches an old wound, a place that once needed protection, and it deserves compassion, not self-examination for what you might be projecting." },
  { icon: "\u{1F30C}", title: "Source Consciousness", body: "From the perspective of Source Consciousness, we're all expressions of the same underlying energy, learning, growing, and reflecting different pieces of the whole back to one another. Every connection, easy or difficult, is part of that larger unfolding." },
  { icon: "\u{1F4D6}", title: "Soul Lessons", body: "Some connections arrive to comfort you. Others arrive to catalyze growth you couldn't access any other way. Neither is more spiritual than the other, and a difficult connection doesn't mean you did something wrong to attract it." }
];

function startHtml() {
  const cards = START_CONCEPTS.map((c, i) => {
    const open = state.openStartConcept === i;
    return `<div class="accordion-item" onclick="toggleStartConcept(${i})">
      <div class="t">${c.icon} ${c.title}</div>
      ${open ? `<div class="accordion-body">${c.body}</div>` : ""}
    </div>`;
  }).join("");
  return `
    <h2>\u{1FA9E} Understanding Soul Connections</h2>
    <div class="safety-box">
      <p><strong>A gentle but important note before you begin:</strong> this journal is never about deciding you deserved to be mistreated, or that someone else's harmful behavior is your responsibility. If a connection has been abusive or unsafe, please prioritize your safety and seek real support first. This work is about tending to what's alive in you now, not justifying what happened to you.</p>
    </div>
    <p>Tap each card below to explore it.</p>
    ${cards}
    <div class="btn-row">
      <button class="btn gold" onclick="selectTab('types')">Explore Types Of Connections &rarr;</button>
      <button class="btn ghost" onclick="selectTab('decode')">Decode A Connection &rarr;</button>
    </div>
  `;
}

function toggleStartConcept(i) {
  state.openStartConcept = state.openStartConcept === i ? null : i;
  render();
}

/* ---------- TYPES OF CONNECTIONS ---------- */

function typesHtml() {
  const cards = CONNECTION_TYPES.map((c, i) => {
    const open = state.openType === i;
    return `<div class="accordion-item" onclick="toggleType(${i})">
      <div class="t">${c.icon} ${c.title}</div>
      <div style="font-size:12px; color:var(--muted-2); margin-top:3px;">${c.subtitle}</div>
      ${open ? `<div class="accordion-body">${c.body}</div>` : ""}
    </div>`;
  }).join("");
  return `
    <h2>\u{1F30C} Types Of Soul Connections</h2>
    <p>Karmic, catalyst, soulmate, twin flame, ultimately these are just labels. What actually matters is what the connection is teaching you, not which category it fits into. Tap each one to see the common energy associated with it.</p>
    ${cards}
    <div class="card ritual">
      <p style="margin-bottom:0; color:var(--text);">The goal isn't to label or fixate. It's to listen, to observe what this connection is teaching you about your own soul's evolution.</p>
    </div>
    <div class="btn-row"><button class="btn gold" onclick="selectTab('decode')">Decode A Connection &rarr;</button></div>
  `;
}

function toggleType(i) {
  state.openType = state.openType === i ? null : i;
  render();
}

/* ---------- DECODE WIZARD ---------- */

function decodeHtml() {
  const step = DECODE_STEPS[state.decodeStep];
  const isLast = state.decodeStep === DECODE_STEPS.length - 1;
  const dots = DECODE_STEPS.map((s, i) => `<div class="step-dot ${i === state.decodeStep ? "active" : i < state.decodeStep ? "done" : ""}"></div>`).join("");

  const fields = step.fields.map(f => {
    const val = state.current[f.key] || "";
    if (f.type === "text") {
      return `<div class="journal-q">${f.label}</div><input type="text" id="f-${f.key}" placeholder="${f.placeholder || ""}" value="${val.replace(/"/g, "&quot;")}" />`;
    }
    return `<div class="journal-q">${f.label}</div><textarea id="f-${f.key}">${val}</textarea>`;
  }).join("");

  return `
    <div class="step-progress">STEP ${state.decodeStep + 1} OF ${DECODE_STEPS.length}</div>
    <div class="step-dots">${dots}</div>
    <h2>${step.heading}</h2>
    ${step.intro ? `<p>${step.intro}</p>` : ""}
    ${step.ritual ? `<div class="card ritual"><p style="margin-bottom:0; color:var(--gold-soft); font-family:'Playfair Display', serif; font-style:italic; font-size:16px;">${step.ritual}</p></div>` : ""}
    <div class="card">${fields}</div>
    <div class="btn-row">
      ${state.decodeStep > 0 ? `<button class="btn ghost" onclick="decodeNav(-1)">&larr; Back</button>` : ""}
      ${isLast
        ? `<button class="btn gold" onclick="saveConnection()">Save This Reflection</button>`
        : `<button class="btn gold" onclick="decodeNav(1)">Continue &rarr;</button>`}
    </div>
  `;
}

function decodeNav(dir) {
  const step = DECODE_STEPS[state.decodeStep];
  step.fields.forEach(f => {
    const el = document.getElementById("f-" + f.key);
    if (el) state.current[f.key] = el.value;
  });
  go({ decodeStep: state.decodeStep + dir });
}

function saveConnection() {
  const step = DECODE_STEPS[state.decodeStep];
  step.fields.forEach(f => {
    const el = document.getElementById("f-" + f.key);
    if (el) state.current[f.key] = el.value;
  });
  const entry = { date: new Date().toLocaleString(), label: state.current.label || "Untitled Connection", data: { ...state.current } };
  state.savedConnections.push(entry);
  go({ activeTab: "journal", decodeStep: 0, current: {} });
}

/* ---------- MY JOURNAL ---------- */

function journalHtml() {
  const sorted = [...state.savedConnections].map((e, i) => ({ ...e, idx: i })).reverse();
  const entries = sorted.map(e => {
    const open = state.openEntry === e.idx;
    return `<div class="accordion-item" onclick="toggleEntry(${e.idx})">
      <div class="t">${e.label} <span style="font-family:'DM Mono', monospace; font-size:10px; color:var(--muted-2); font-weight:400;">&middot; ${e.date}</span></div>
      ${open ? connectionDetailHtml(e.data) : ""}
    </div>`;
  }).join("");
  const empty = entries === "" ? "<p>Nothing here yet. Decode your first connection to start filling this in.</p>" : "";
  return `
    <h2>\u{1F4D3} My Journal, ${state.name}</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your answers save automatically</strong>, right here in this browser, on this device. Close the tab, come back next week, it'll still be here. It won't follow you to a different browser or device though, and clearing your browser's data will erase it, so download your journal now and then whenever you want a backup you can keep.</span></div>
    ${entries || empty}
    <div class="btn-row">
      <button class="btn gold" onclick="downloadJournal()">Download My Journal</button>
      <button class="btn ghost" onclick="selectTab('decode')">Decode Another Connection</button>
    </div>
  `;
}

function connectionDetailHtml(d) {
  const rows = [
    ["How this connection has activated me", d.activation],
    ["What attracted me", d.attracted],
    ["What I already embody", d.already],
    ["What I want to cultivate more boldly", d.cultivate],
    ["What repelled me", d.repelled],
    ["Trait or treatment", d.traitOrTreatment],
    ["The disowned part this might point to", d.disownedPart],
    ["What this reminded me of", d.reminds],
    ["The younger part of me that needed protection", d.youngerPart],
    ["What I'd say to that part of me now", d.sayToPart],
    ["What this connection is here to teach me", d.teach],
    ["What it's inviting me to heal, claim, or release", d.healClaim],
    ["What I want to remember", d.remember]
  ];
  const html = rows.filter(r => r[1]).map(r => `<div class="q">${r[0]}</div><div class="a">${r[1]}</div>`).join("");
  return `<div class="accordion-body">${html || "<em>No details recorded.</em>"}</div>`;
}

function toggleEntry(i) {
  state.openEntry = state.openEntry === i ? null : i;
  render();
}

function downloadJournal() {
  let text = "THE SOUL CONNECTION MIRROR WORK JOURNAL\nMy Journal, " + state.name + "\n\n";
  if (!state.savedConnections.length) {
    text += "No entries yet.\n";
  } else {
    [...state.savedConnections].reverse().forEach(e => {
      text += "== " + e.date + " \u00B7 " + e.label + " ==\n";
      const d = e.data;
      const rows = [
        ["How this connection has activated me", d.activation],
        ["What attracted me", d.attracted],
        ["What I already embody", d.already],
        ["What I want to cultivate more boldly", d.cultivate],
        ["What repelled me", d.repelled],
        ["Trait or treatment", d.traitOrTreatment],
        ["The disowned part this might point to", d.disownedPart],
        ["What this reminded me of", d.reminds],
        ["The younger part of me that needed protection", d.youngerPart],
        ["What I'd say to that part of me now", d.sayToPart],
        ["What this connection is here to teach me", d.teach],
        ["What it's inviting me to heal, claim, or release", d.healClaim],
        ["What I want to remember", d.remember]
      ];
      rows.forEach(r => { if (r[1]) text += r[0] + ": " + r[1] + "\n"; });
      text += "\n";
    });
  }
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-soul-connection-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- LEARN MORE ---------- */

function learnHtml() {
  const items = LEARN_LINKS.map(l => {
    const isPlaceholder = l.url === "#";
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link-item" style="${isPlaceholder ? "opacity:0.6; pointer-events:none;" : ""}">
      <div class="link-icon">${l.icon}</div>
      <div><div class="t">${l.title} <span class="tier-badge">PREMIUM</span>${isPlaceholder ? ' <span class="tier-badge" style="background:rgba(255,255,255,0.1); color:var(--muted-2); border-color:var(--line);">LINK COMING SOON</span>' : ""}</div><div class="s">${l.subtitle}</div></div>
    </a>`;
  }).join("");
  return `
    <h2>\u2728 Learn More</h2>
    <p>Go deeper into the concepts behind this journal, inner child parts, love wounds, and soul connections themselves.</p>
    ${items}
  `;
}

/* ---------- ROUTER ---------- */

const STORAGE_KEY = "soul-connection-mirror-work-v1";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (e) { /* corrupted or unavailable, start fresh */ }
}

function render() {
  saveState();
  if (state.screen === "name") { renderName(); return; }
  let content = "";
  if (state.activeTab === "start") content = startHtml();
  else if (state.activeTab === "types") content = typesHtml();
  else if (state.activeTab === "decode") content = decodeHtml();
  else if (state.activeTab === "journal") content = journalHtml();
  else if (state.activeTab === "learn") content = learnHtml();

  document.getElementById("app").innerHTML = `
    ${topNav()}
    ${content}
    ${footer()}
  `;
}

loadState();
render();
</script>
